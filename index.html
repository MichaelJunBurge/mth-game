<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="color-scheme" content="light" />
<title>mth game</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@500;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --ink: #111;
    --grey: #c9c9c9;
    --green: #1ec96f;
    --red: #e8503a;
    --font: "Roboto Mono", ui-monospace, "Courier New", monospace;

    /* One width drives the column AND every text size, so they scale together
       and stop growing once the column is capped. */
    --app-w: min(60vw, 310px);                  /* mobile: ~60% of the screen */
    --size-target: calc(var(--app-w) * 0.15);   /* the 000 target — hero size */
    --size-number: calc(var(--app-w) * 0.066);  /* six numbers + main calc line */
    --size-ui: calc(var(--app-w) * 0.05);        /* timer, keys, tape, buttons */

    /* Opacity convention: anything you cannot click sits at 20%. */
    --muted: rgba(17, 17, 17, 0.2);
  }
  @media (min-width: 768px) {
    :root { --app-w: min(33vw, 310px); }         /* desktop: ~a third, capped */
  }
  * { box-sizing: border-box; }
  /* Lock the viewport: the page itself never scrolls or rubber-bands. Only the
     expanded calculation tape scrolls, internally. */
  html, body {
    height: 100%;
    overflow: hidden;
    overscroll-behavior: none;
  }
  html { background: #ffffff; }
  body {
    margin: 0;
    background: #ffffff;
    color: var(--ink);
    font-family: var(--font);
    -webkit-font-smoothing: antialiased;
  }

  /* Green perimeter indicator — one continuous bar, browser-animated */
  .border {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 50;
    opacity: 0;
    transition: opacity 1s ease; /* gentle fade-in */
  }
  body.entering .border, body.playing .border { opacity: 1; }
  .border path {
    fill: none;
    stroke: var(--green);
    stroke-width: 10;
    stroke-linejoin: round;
    stroke-linecap: round;
    stroke-dasharray: 1000 1000; /* pathLength=1000 -> one full lap */
    stroke-dashoffset: 0;        /* full ring by default */
    will-change: stroke-dashoffset;
  }
  /* The ring starts full and drains away clockwise over the round (animation
     applied in JS once the calculator appears). When empty, a red ring grows
     clockwise for one rotation, then stays solid red. */
  @keyframes borderDrain {
    from { stroke-dashoffset: 0; }     /* full perimeter */
    to   { stroke-dashoffset: -1000; } /* empty, draining clockwise */
  }
  @keyframes borderFill {
    from { stroke-dashoffset: 1000; }  /* empty */
    to   { stroke-dashoffset: 0; }     /* full, filling clockwise */
  }

  /* Timer */
  /* Timer — non-clickable, so it sits at the muted 20%. */
  .timer {
    position: fixed;
    top: 5vh;
    left: 0;
    right: 0;
    text-align: center;
    font-size: var(--size-ui);
    font-weight: 700;
    letter-spacing: 0.15em;
    color: var(--muted);
    z-index: 40;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
  }
  body.entering .timer, body.playing .timer { opacity: 1; }

  /* Submit — mirrors the timer at the bottom. Sits muted (like the timer) and
     brightens to full black on hover (no scale animation). */
  .submit {
    position: fixed;
    bottom: 5vh;
    left: 0;
    right: 0;
    text-align: center;
    font-family: var(--font);
    font-size: var(--size-ui);
    font-weight: 700;
    letter-spacing: 0.15em;
    color: var(--ink);
    background: none;
    border: none;
    cursor: pointer;
    z-index: 40;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  body.playing .submit { opacity: 0.2; pointer-events: auto; }
  body.playing .submit:hover { opacity: 1; }

  .stage {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  /* One centered column whose width is the shared --app-w. Spacing is on the
     children (not a flex gap) so the collapsed calculator adds no gap on home. */
  .content {
    width: var(--app-w);
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* Target */
  .target {
    display: flex;
    gap: 0.05em;
    cursor: pointer;
    user-select: none;
    line-height: 1;
  }
  .reel {
    display: inline-block;
    width: 0.62em;
    text-align: center;
    font-size: var(--size-target);
    font-weight: 700;
  }
  .reel.spinning { color: #444; }
  .reel.lock { animation: pop 0.28s ease; }
  @keyframes pop {
    0%   { transform: translateY(-6px) scale(1.12); }
    60%  { transform: translateY(2px) scale(0.98); }
    100% { transform: translateY(0) scale(1); }
  }

  /* Number slots — 6-column grid, full content width */
  .slots {
    width: 100%;
    margin-top: 3vh; /* space below the target */
    display: grid;
    grid-template-columns: repeat(6, 1fr);
  }
  .slot {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.35em;
  }
  .arrow {
    background: none;
    border: none;
    padding: 0.15em 0.3em;
    color: var(--ink);
    cursor: pointer;
    user-select: none;
    display: flex;
    max-height: 4em;
    overflow: hidden;
    transition: transform 0.08s, opacity 0.5s ease, max-height 0.8s ease-in-out, padding 0.8s ease-in-out;
  }
  .arrow svg { width: var(--size-ui); height: auto; display: block; }
  .arrow:hover { transform: scale(1.25); }
  .arrow:active { transform: scale(0.9); }
  .arrow:disabled { opacity: 0.2; cursor: default; transform: none; } /* non-clickable */
  /* Entrance: arrows fade out first (numbers stay put). Their collapse during
     the rise is driven from JS (pinned to natural height) so it runs in sync
     with the calculator opening — see collapseArrows(). */
  body.entering .arrow,
  body.playing .arrow { opacity: 0; pointer-events: none; }
  .slot-num {
    font-size: var(--size-number);
    font-weight: 700;
    color: var(--muted); /* empty placeholder — not clickable */
    text-align: center;
    transition: color 0.15s, opacity 0.15s;
  }
  .slot-num.filled { color: var(--ink); }
  .slot-num.spinning { color: #9a9a9a; }
  .slot-num.lock { animation: pop 0.26s ease; }
  .slot-num.used { opacity: 0.2; } /* dim numbers already used in an equation */

  /* Calculator — hidden until all six numbers are drawn.
     The 5 key columns are widened to span the 6 numbers' centres
     (1/12 .. 11/12), so the outer columns sit under the outer numbers. */
  .calc {
    width: 100%;
    margin-top: 0;
    display: none;
    flex-direction: column;
    gap: 1.1em;
    max-height: 0;
    opacity: 0;
    overflow: hidden;
    /* numbers slide up (max-height), then the calc fades in (opacity) */
    transition: max-height 0.8s ease-in-out, opacity 0.5s ease;
  }
  /* Entrance: calc joins the flow collapsed, expands (raised) to push the
     numbers up, then fades in (playing). */
  body.entering .calc,
  body.playing .calc { display: flex; }
  body.playing .calc { opacity: 1; }
  /* max-height during the rise is set from JS to the calc's real content height
     so the rise stays 1:1 in sync with the arrow collapse. */

  /* Equation tape: about three faded previous lines sit above the input line,
     with a white gradient fading the oldest toward the top. */
  .history-wrap {
    position: relative;
    width: 100%;
  }
  .history {
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    align-items: flex-end;
    gap: 0.5em;
    line-height: 1.15;
    height: 5.2em;            /* three lines fully visible, a 4th fading at top */
    overflow: hidden;
    font-size: var(--size-ui);
    font-weight: 400;
    scrollbar-width: none;    /* invisible scrollbar */
    /* match the display so each line's last digit centres on the right column */
    padding-right: calc(100% / 12 - 0.3em);
  }
  .history::-webkit-scrollbar { display: none; }
  .history .line {
    color: #9a9a9a;
    white-space: nowrap;
  }
  .history-wrap::after {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    /* white at the top fading down toward the main line — older lines fade out,
       hinting there's more to reveal by tapping */
    background: linear-gradient(to bottom, #fff 0%, #fff 4%, rgba(255, 255, 255, 0) 75%);
  }
  .history:not(:empty) { cursor: pointer; }
  /* Tapping the tape drops the fade and reveals every line in full. */
  .history-wrap.expanded::after { display: none; }
  .history-wrap.expanded .history {
    height: auto;
    max-height: 32vh;
    overflow-y: auto;
    overscroll-behavior: contain;
    justify-content: flex-start;
  }

  .display {
    width: 100%;
    /* Right-align and nudge the last digit half a glyph further right so it
       sits centred over the far-right key column (9 / 6 / 3) and the last
       number. Typed digits grow leftward. */
    text-align: right;
    padding-right: calc(100% / 12 - 0.3em);
    white-space: nowrap;
    overflow: hidden;
    min-height: 1.2em;
    font-size: var(--size-number); /* main line matches the six numbers */
  }
  .display .val {
    font-weight: 700;
    color: var(--ink);
  }
  .display.empty .val { color: var(--muted); } /* "00" placeholder — not clickable */
  .display.win .val { color: var(--green); }
  .display.error .val { color: var(--red); }

  .keys {
    width: calc(100% * 25 / 24);
    margin-left: calc(100% * -1 / 48);
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    column-gap: 0;
    row-gap: 0.7em;
    justify-items: center;
  }
  .key {
    background: none;
    border: none;
    font-family: var(--font);
    font-size: var(--size-ui);
    font-weight: 500;
    color: var(--ink);
    cursor: pointer;
    padding: 0.15em 0.4em;
    user-select: none;
    transition: transform 0.08s, opacity 0.12s;
  }
  .key:hover { transform: scale(1.25); }
  .key:active { transform: scale(0.9); }
  .key.clear { color: var(--red); }
  .key.equals { color: var(--green); }

  /* Result screen — same minimal system as the rest of the app. The result
     value uses the target (hero) size; labels and working use the UI size. */
  .winscreen {
    position: fixed;
    inset: 0;
    z-index: 60;
    background: #ffffff;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3vh;
  }
  body.won .winscreen { display: flex; }
  .win-label {
    font-size: var(--size-ui);
    font-weight: 700;
    letter-spacing: 0.15em;
    color: var(--muted); /* label — not clickable */
    text-transform: uppercase;
  }
  .win-time {
    font-size: var(--size-target);
    font-weight: 700;
    color: var(--ink);
    line-height: 1;
  }
  .win-sub {
    font-size: var(--size-ui);
    font-weight: 400;
    color: var(--muted);
    text-align: center;
    min-height: 1em;
  }
  /* Opponent's working, revealed after a shared game ends */
  .win-their {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 0.5em;
    line-height: 1.15;
  }
  .win-their.show { display: flex; }
  .their-title {
    font-size: var(--size-ui);
    font-weight: 700;
    color: var(--muted);
    margin-bottom: 0.4em;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }
  .their-line {
    font-size: var(--size-ui);
    font-weight: 400;
    color: #9a9a9a;
  }
  .win-actions {
    display: flex;
    gap: 2.5em;
  }
  /* Share/Home — clickable, so full black and identical to the Submit button. */
  .win-btn {
    background: none;
    border: none;
    font-family: var(--font);
    font-size: var(--size-ui);
    font-weight: 700;
    letter-spacing: 0.15em;
    color: var(--ink);
    cursor: pointer;
    padding: 0.2em 0.4em;
    transition: transform 0.08s;
  }
  .win-btn:hover { transform: scale(1.12); }
  .win-btn:active { transform: scale(0.94); }

  /* "Beat" banner — shown under the timer when playing a shared puzzle */
  .beat {
    position: fixed;
    top: 9vh;
    left: 0;
    right: 0;
    text-align: center;
    font-family: var(--font);
    font-size: var(--size-ui);
    font-weight: 700;
    letter-spacing: 0.15em;
    color: var(--green);
    z-index: 40;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
  }
  body.playing .beat.show { opacity: 1; }

  .toast {
    position: fixed;
    bottom: 4vh;
    left: 50%;
    transform: translateX(-50%);
    background: var(--ink);
    color: #fff;
    font-size: clamp(0.8rem, 1.2vw, 1.1rem);
    padding: 0.6em 1.2em;
    border-radius: 6px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
    z-index: 70;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>
  <svg class="border" preserveAspectRatio="none" aria-hidden="true">
    <path id="border-path" pathLength="1000" d="" />
  </svg>

  <div id="timer" class="timer">00:00</div>
  <div id="beat" class="beat"></div>

  <button id="submit" class="submit">Submit</button>

  <main class="stage">
    <div class="content">
      <div id="target" class="target" role="button" tabindex="0" aria-label="Generate target number">
        <span class="reel">0</span>
        <span class="reel">0</span>
        <span class="reel">0</span>
      </div>

      <div id="slots" class="slots"></div>

      <div class="calc">
        <div class="history-wrap">
          <div id="history" class="history"></div>
        </div>
        <div id="display" class="display empty"><span class="val">00</span></div>
        <div id="keys" class="keys"></div>
      </div>
    </div>
  </main>

  <div id="winscreen" class="winscreen">
    <div id="win-label" class="win-label">Solved in</div>
    <div id="win-value" class="win-time">00:00</div>
    <div id="win-sub" class="win-sub"></div>
    <div id="win-their" class="win-their"></div>
    <div class="win-actions">
      <button id="win-home" class="win-btn">Home</button>
      <button id="win-share" class="win-btn share">Share</button>
    </div>
  </div>

  <div id="toast" class="toast"></div>

<script>
"use strict";

/* ---------------- Number pools ---------------- */
const SLOT_COUNT = 6;
function freshLargeBag() {
  // Multiples of five from 20 up to 100, one of each (no duplicates).
  const bag = [];
  for (let n = 20; n <= 100; n += 5) bag.push(n);
  return bag;
}
function freshSmallBag() {
  // One of each 1..10 — no duplicates, so the six numbers are always distinct.
  const bag = [];
  for (let n = 1; n <= 10; n++) bag.push(n);
  return bag;
}
let largeBag = freshLargeBag();
let smallBag = freshSmallBag();

/* ---------------- DOM ---------------- */
const SVGNS = "http://www.w3.org/2000/svg";
const targetEl = document.getElementById("target");
const reels = [...targetEl.querySelectorAll(".reel")];
const slotsEl = document.getElementById("slots");
const timerEl = document.getElementById("timer");
const borderSvg = document.querySelector(".border");
const borderPath = document.getElementById("border-path");
const displayEl = document.getElementById("display");
const displayValEl = displayEl.querySelector(".val");
const keysEl = document.getElementById("keys");
const historyEl = document.getElementById("history");
const historyWrapEl = document.querySelector(".history-wrap");
const calcEl = document.querySelector(".calc");
const winLabelEl = document.getElementById("win-label");
const winValueEl = document.getElementById("win-value");
const winSubEl = document.getElementById("win-sub");
const winTheirEl = document.getElementById("win-their");
const winHomeBtn = document.getElementById("win-home");
const winShareBtn = document.getElementById("win-share");
const toastEl = document.getElementById("toast");
const submitEl = document.getElementById("submit");
const beatEl = document.getElementById("beat");

let isRollingTarget = false;
let currentTarget = null;
const slotValues = new Array(SLOT_COUNT).fill(null);
const slotUsed = new Array(SLOT_COUNT).fill(false);
let history = [];
// Numbers currently usable in an equation: the six drawn numbers plus any
// results produced along the way. Each is consumed once.
let available = [];
let lastResult = null;     // most recent calculator answer (the "reached" value)
let lastOutcome = null;    // this player's result for the just-finished game
let sharedGame = null;     // when set, we're playing a puzzle someone sent us
let borderDurationSec = 120; // how long the green bar takes to go around
let activeShareCode = null;  // the ?g= code this game came from (for refresh restore)

function randInt(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

/* ---------------- Chevron arrows (identical up/down) ---------------- */
function chevron(dir) {
  const svg = document.createElementNS(SVGNS, "svg");
  svg.setAttribute("viewBox", "0 0 16 12");
  const p = document.createElementNS(SVGNS, "path");
  p.setAttribute("d", dir === "up" ? "M2 9 L8 3 L14 9" : "M2 3 L8 9 L14 3");
  p.setAttribute("fill", "none");
  p.setAttribute("stroke", "currentColor");
  p.setAttribute("stroke-width", "2.4");
  p.setAttribute("stroke-linecap", "round");
  p.setAttribute("stroke-linejoin", "round");
  svg.appendChild(p);
  return svg;
}

/* ---------------- Slots ---------------- */
function buildSlots() {
  slotsEl.innerHTML = "";
  for (let i = 0; i < SLOT_COUNT; i++) {
    const slot = document.createElement("div");
    slot.className = "slot";

    const up = document.createElement("button");
    up.className = "arrow up";
    up.setAttribute("aria-label", "Draw a large number");
    up.appendChild(chevron("up"));
    up.addEventListener("click", () => drawInto(i, "large"));

    const num = document.createElement("div");
    num.className = "slot-num";
    num.textContent = "00";

    const down = document.createElement("button");
    down.className = "arrow down";
    down.setAttribute("aria-label", "Draw a small number");
    down.appendChild(chevron("down"));
    down.addEventListener("click", () => drawInto(i, "small"));

    slot.append(up, num, down);
    slotsEl.appendChild(slot);
  }
}

function slotParts(i) {
  const slot = slotsEl.children[i];
  return {
    up: slot.querySelector(".up"),
    down: slot.querySelector(".down"),
    num: slot.querySelector(".slot-num"),
  };
}

function resetSlots() {
  for (let i = 0; i < SLOT_COUNT; i++) {
    const { up, down, num } = slotParts(i);
    num.textContent = "00";
    num.className = "slot-num";
    // Arrows stay disabled until a target has been generated.
    up.disabled = true;
    down.disabled = true;
    slotValues[i] = null;
    slotUsed[i] = false;
  }
  largeBag = freshLargeBag();
  smallBag = freshSmallBag();
}

// Enable/disable the draw arrows on every still-empty slot.
function setArrowsEnabled(enabled) {
  for (let i = 0; i < SLOT_COUNT; i++) {
    const { up, down, num } = slotParts(i);
    if (num.classList.contains("filled")) continue;
    up.disabled = !enabled;
    down.disabled = !enabled;
  }
}

function countFilled() {
  let n = 0;
  for (let i = 0; i < SLOT_COUNT; i++) {
    if (slotParts(i).num.classList.contains("filled")) n++;
  }
  return n;
}

function drawInto(i, size) {
  const { up, down, num } = slotParts(i);
  if (num.classList.contains("filled") || num.classList.contains("spinning")) return;

  const bag = size === "large" ? largeBag : smallBag;
  if (bag.length === 0) {
    num.animate([{ opacity: 1 }, { opacity: 0.25 }, { opacity: 1 }], { duration: 300 });
    return;
  }

  const value = bag.splice(randInt(0, bag.length - 1), 1)[0];
  slotValues[i] = value;

  num.classList.add("spinning");
  const spin = setInterval(() => {
    num.textContent = size === "large" ? randInt(10, 99) : randInt(1, 9);
  }, 45);

  setTimeout(() => {
    clearInterval(spin);
    num.textContent = value;
    num.classList.remove("spinning");
    num.classList.add("filled", "lock");
    setTimeout(() => num.classList.remove("lock"), 280);
    up.disabled = true;
    down.disabled = true;
    // Only begin once BOTH the target and all six numbers exist.
    if (countFilled() === SLOT_COUNT && currentTarget !== null) beginEntrance();
    else saveState(); // persist selection progress
  }, 420);
}

/* ---------------- Green border geometry (CSS drives the motion) ---------------- */
function layoutBorder() {
  const w = window.innerWidth;
  const h = window.innerHeight;
  const inset = 5; // half the stroke width, keeps the bar fully on-screen
  const cx = w / 2;
  borderSvg.setAttribute("viewBox", `0 0 ${w} ${h}`);
  // Start at top-centre and run clockwise (toward the top-right first) so the
  // green grows from the top centre to the right.
  borderPath.setAttribute(
    "d",
    `M${cx} ${inset} L${w - inset} ${inset} L${w - inset} ${h - inset} ` +
    `L${inset} ${h - inset} L${inset} ${inset} Z`
  );
}
window.addEventListener("resize", layoutBorder);

// When the green ring finishes draining, a red ring grows for one rotation
// (same duration as the green lap); when that finishes, it stays solid red.
borderPath.addEventListener("animationend", (e) => {
  if (e.animationName === "borderDrain") {
    document.body.classList.add("time-up");
    startRedFill();
  } else if (e.animationName === "borderFill") {
    borderPath.style.animation = "none";
    borderPath.style.stroke = "var(--red)";
    borderPath.style.strokeDashoffset = "0"; // solid full red
  }
});
function resetBorder() {
  // back to the full, static green ring
  borderPath.style.animation = "";
  borderPath.style.stroke = "";
  borderPath.style.strokeDashoffset = "";
  borderPath.style.animationDelay = "";
}
// Start (or resume, via delaySec) the green drain — full to empty, clockwise.
function startBorderDrain(delaySec) {
  borderPath.style.stroke = "";
  borderPath.style.strokeDashoffset = "";
  borderPath.style.animation = "borderDrain " + borderDurationSec + "s linear forwards";
  borderPath.style.animationDelay = "-" + (delaySec || 0) + "s";
}
// Red ring grows clockwise for one rotation (same duration as the green lap),
// then locks solid.
function startRedFill() {
  borderPath.style.stroke = "var(--red)";
  borderPath.style.strokeDashoffset = "";
  borderPath.style.animationDelay = "0s";
  borderPath.style.animation = "borderFill " + borderDurationSec + "s linear forwards";
}

/* ---------------- Timer text ---------------- */
let timerInt = null;
let startEpoch = 0; // absolute ms when the round began (survives a refresh)

function fmtTime(totalSeconds) {
  const s = Math.floor(totalSeconds);
  const mm = String(Math.floor(s / 60)).padStart(2, "0");
  const ss = String(s % 60).padStart(2, "0");
  return mm + ":" + ss;
}

function runTimerLoop() {
  timerEl.textContent = fmtTime((Date.now() - startEpoch) / 1000);
  clearInterval(timerInt);
  timerInt = setInterval(() => {
    timerEl.textContent = fmtTime((Date.now() - startEpoch) / 1000);
  }, 250);
}

function startTimer() {
  startEpoch = Date.now();
  runTimerLoop();
}

function stopTimer() {
  clearInterval(timerInt);
}

/* ---------------- Calculator ---------------- */
const KEYS = [
  "^", "√", "7", "8", "9",
  "x", "÷", "4", "5", "6",
  "-", "+", "1", "2", "3",
  "(", ")", "c", "0", "=",
];
let expr = "";
let justEvaluated = false; // true while the display is showing a fresh result
let carry = null;          // previous answer carried into the current line

function buildKeys() {
  keysEl.innerHTML = "";
  KEYS.forEach((label) => {
    const btn = document.createElement("button");
    btn.className = "key";
    if (label === "c") btn.classList.add("clear");
    if (label === "=") btn.classList.add("equals");
    btn.textContent = label;
    btn.addEventListener("click", () => pressKey(label));
    // Double-clicking the red clear wipes the whole tape back to blank.
    if (label === "c") btn.addEventListener("dblclick", clearAll);
    keysEl.appendChild(btn);
  });
}

function renderHistory() {
  historyEl.innerHTML = "";
  history.forEach((line) => {
    const d = document.createElement("div");
    d.className = "line";
    d.textContent = line;
    historyEl.appendChild(d);
  });
}

function clearAll() {
  history = [];
  renderHistory();
  historyWrapEl.classList.remove("expanded");
  expr = "";
  justEvaluated = false;
  carry = null;
  renderDisplay();
  // Fresh canvas: restore the six numbers and the available pool.
  for (let i = 0; i < SLOT_COUNT; i++) {
    slotUsed[i] = false;
    slotParts(i).num.classList.remove("used");
  }
  if (document.body.classList.contains("playing")) initAvailable();
  saveState();
}

function initAvailable() {
  available = slotValues.map((v, i) => ({ value: v, slotIndex: i }));
  // The target itself is usable too, so players can work backwards from it.
  if (currentTarget !== null) available.push({ value: currentTarget, slotIndex: null });
}

function renderDisplay() {
  if (expr === "") {
    displayValEl.textContent = "00";
    displayEl.className = "display empty";
  } else {
    displayValEl.textContent = expr;
    displayEl.className = "display";
  }
}

// Send the shown answer up into the tape and reset the main line to 00.
function liftResult() {
  if (expr !== "") {
    history.push(expr);
    renderHistory();
  }
  expr = "";
  justEvaluated = false;
  carry = null;
  renderDisplay();
}

function pressKey(label) {
  if (label === "c") {
    // Clear wipes the current line, but never loses the previous answer:
    //  - on a freshly shown result, lift it up (like a second =)
    //  - if the line was started from a previous answer, push that answer up
    //  - otherwise just wipe a from-scratch equation
    if (justEvaluated) {
      liftResult();
    } else if (carry !== null) {
      history.push(carry);
      renderHistory();
      carry = null;
      expr = "";
      renderDisplay();
    } else {
      expr = "";
      renderDisplay();
    }
    saveState();
    return;
  }
  if (label === "=") {
    handleEquals();
    saveState();
    return;
  }
  // Typing right after a result: a number/sqrt/decimal/bracket starts a fresh
  // entry; an operator continues from the result. Either way, remember that
  // result so a later clear can preserve it.
  if (justEvaluated) {
    carry = expr;
    if (/[0-9√(]/.test(label)) expr = "";
    justEvaluated = false;
  }
  expr += label === "√" ? "√(" : label;
  renderDisplay();
  saveState();
}

function handleEquals() {
  if (justEvaluated) {
    // Second press: send the shown result up a line and start fresh at 00.
    liftResult();
    return;
  }
  evaluate();
}

function evaluate() {
  if (expr === "") return;
  if (!/^[0-9+\-x÷^√().\s]*$/.test(expr)) return showError();

  const js = expr
    .replace(/√/g, "Math.sqrt")
    .replace(/x/g, "*")
    .replace(/÷/g, "/")
    .replace(/\^/g, "**");

  let value;
  try {
    value = Function('"use strict"; return (' + js + ");")();
  } catch (e) {
    return showError();
  }
  if (typeof value !== "number" || !isFinite(value)) return showError();

  const rounded = Math.round(value * 1e6) / 1e6;

  // Strict rule check: every number literal must be one of the still-available
  // numbers (an original drawn number or a result made earlier). Otherwise the
  // move is illegal and rejected.
  const literals = (expr.match(/\d+(?:\.\d+)?/g) || []).map(Number);
  const pool = available.map((e) => ({ value: e.value, slotIndex: e.slotIndex, taken: false }));
  const consumed = [];
  for (const lit of literals) {
    // Prefer consuming an original drawn number so it fades.
    let idx = pool.findIndex((e) => !e.taken && e.value === lit && e.slotIndex !== null);
    if (idx === -1) idx = pool.findIndex((e) => !e.taken && e.value === lit);
    if (idx === -1) return showError(); // number not available -> illegal move
    pool[idx].taken = true;
    consumed.push(pool[idx]);
  }

  // Commit: fade used original numbers, drop consumed entries, add the result.
  consumed.forEach((c) => {
    if (c.slotIndex !== null) {
      slotUsed[c.slotIndex] = true;
      slotParts(c.slotIndex).num.classList.add("used");
    }
  });
  available = pool.filter((e) => !e.taken).map((e) => ({ value: e.value, slotIndex: e.slotIndex }));
  available.push({ value: rounded, slotIndex: null });
  lastResult = rounded; // the value the player has reached so far

  // The equation moves up into the tape; the answer drops onto the main line.
  // A second press of = sends the answer up too and resets to 00.
  history.push(expr);
  renderHistory();
  expr = String(rounded);
  justEvaluated = true;
  carry = null; // the equation (with its inputs) is already in the tape
  renderDisplay();

  // Clean solve only when the target is matched AND all six numbers are used.
  const allUsed = slotUsed.every(Boolean);
  if (currentTarget !== null && rounded === currentTarget && allUsed) finishSolved();
}

function showError() {
  displayValEl.textContent = "Error";
  displayEl.className = "display error";
}

/* ---------------- Round flow ---------------- */
// Collapse the (already faded) arrows from their natural height to zero, in
// sync with the calculator opening, so the numbers and target each travel
// straight to their final spots with no two-step or dip.
function collapseArrows() {
  const arrows = document.querySelectorAll(".arrow");
  arrows.forEach((a) => {
    const h = a.offsetHeight;
    a.style.transition = "none";
    a.style.maxHeight = h + "px"; // pin current height
  });
  void document.body.offsetHeight; // commit the pinned heights
  arrows.forEach((a) => {
    a.style.transition = ""; // back to the CSS transition
    a.style.maxHeight = "0px";
    a.style.paddingTop = "0";
    a.style.paddingBottom = "0";
  });
}
function collapseArrowsInstant() {
  document.querySelectorAll(".arrow").forEach((a) => {
    a.style.transition = "none";
    a.style.maxHeight = "0px";
    a.style.paddingTop = "0";
    a.style.paddingBottom = "0";
    void a.offsetHeight;
    a.style.transition = "";
  });
}
function resetArrows() {
  document.querySelectorAll(".arrow").forEach((a) => {
    a.style.transition = "none";
    a.style.maxHeight = "";
    a.style.paddingTop = "";
    a.style.paddingBottom = "";
    void a.offsetHeight;
    a.style.transition = "";
  });
}

// Animate the calculator open to its real content height so the rise spans the
// full duration (1:1), keeping it in sync with the arrow collapse.
function raiseCalc() {
  calcEl.style.maxHeight = calcEl.scrollHeight + "px";
}
function showCalcInstant() {
  calcEl.style.transition = "none";
  calcEl.style.maxHeight = "80vh";
  void calcEl.offsetHeight;
  calcEl.style.transition = "";
}
function resetCalc() {
  calcEl.style.transition = "none";
  calcEl.style.maxHeight = "";
  void calcEl.offsetHeight;
  calcEl.style.transition = "";
}

// Immediate play — no entrance (used by shared links and refresh-restore).
function startPlaying() {
  if (document.body.classList.contains("playing")) return;
  layoutBorder();
  resetBorder();
  initAvailable();
  document.body.classList.remove("time-up", "entering", "raised");
  document.body.classList.add("playing");
  showCalcInstant();
  collapseArrowsInstant();
  startTimer();
  startBorderDrain(0);
  saveState();
}

// Animated entrance from home once all six numbers are drawn:
//  1. full green ring fades in + timer reads 00:00, hold ~1s
//  2. target + numbers rise as the calculator space opens
//  3. calculator + submit fade in
//  4. timer starts and the ring begins draining
let entranceTimers = [];
function beginEntrance() {
  if (document.body.classList.contains("playing") ||
      document.body.classList.contains("entering")) return;
  initAvailable();
  layoutBorder();
  resetBorder();                 // full, static green ring
  timerEl.textContent = "00:00"; // shown but not counting yet
  document.body.classList.remove("time-up");
  document.body.classList.add("entering");
  saveState();
  entranceTimers.forEach(clearTimeout);
  entranceTimers = [];
  const HOLD_MS = 2000;  // hold the full ring + 00:00 with arrows faded out
  const RISE_MS = 800;   // numbers slide up into position
  const FADE_MS = 500;   // calculator fades in
  entranceTimers.push(setTimeout(() => {
    document.body.classList.add("raised");         // numbers rise
    raiseCalc();                                   // calc opens 1:1 with...
    collapseArrows();                              // ...the arrow collapse
    entranceTimers.push(setTimeout(() => {
      document.body.classList.add("playing");      // calc fades in immediately
      calcEl.style.maxHeight = "80vh";             // allow the tape to expand
      entranceTimers.push(setTimeout(() => {
        startTimer();                              // timer starts after the fade
        startBorderDrain(0);                       // ring begins draining
        saveState();
      }, FADE_MS));
    }, RISE_MS));
  }, HOLD_MS));
}

function backToHome() {
  entranceTimers.forEach(clearTimeout);
  entranceTimers = [];
  document.body.classList.remove("playing", "won", "time-up", "entering", "raised");
  resetArrows();
  resetCalc();
  stopTimer();
  resetSlots();
  history = [];
  available = [];
  lastResult = null;
  lastOutcome = null;
  sharedGame = null;
  borderDurationSec = 120;
  activeShareCode = null;
  beatEl.classList.remove("show");
  renderHistory();
  historyWrapEl.classList.remove("expanded");
  expr = "";
  justEvaluated = false;
  carry = null;
  renderDisplay();
  clearSave();
  window.history.replaceState({}, "", location.pathname);
}

/* ---------------- Scoring & end of game ---------------- */
function elapsedSeconds() {
  return (Date.now() - startEpoch) / 1000;
}

// Score when you don't cleanly solve: the value you reached plus the sum of any
// numbers you never used. Closer to the target is better.
function computeScore() {
  const reached = lastResult === null ? 0 : lastResult;
  let unusedSum = 0;
  for (let i = 0; i < SLOT_COUNT; i++) {
    if (!slotUsed[i] && slotValues[i] !== null) unusedSum += slotValues[i];
  }
  return reached + unusedSum;
}

// Make sure a freshly evaluated answer is captured in the tape before we freeze
// the working for sharing.
function flushAnswerToTape() {
  if (justEvaluated && expr !== "") {
    history.push(expr);
    justEvaluated = false;
  }
}

function finishSolved() {
  flushAnswerToTape();
  lastOutcome = { solved: true, timeSec: elapsedSeconds(), score: currentTarget, distance: 0 };
  endGame();
}

function finishSubmitted() {
  flushAnswerToTape();
  const score = computeScore();
  lastOutcome = {
    solved: false,
    timeSec: elapsedSeconds(),
    score: score,
    distance: Math.abs(score - currentTarget),
  };
  endGame();
}

function fmtResult(o) {
  return o.solved ? fmtTime(o.timeSec) : String(o.score);
}

// Compare my result to the opponent's: closer to target wins; ties broken by a
// clean solve, then by faster time.
function verdict(me, them) {
  // Closer to the target wins. If the same number was reached, the faster
  // player wins. Only a dead heat on both is a tie.
  if (me.distance !== them.distance) return me.distance < them.distance ? "win" : "lose";
  if (Math.round(me.timeSec) !== Math.round(them.timeSec)) {
    return me.timeSec < them.timeSec ? "win" : "lose";
  }
  return "tie";
}

function endGame() {
  stopTimer();
  const me = lastOutcome;
  winTheirEl.classList.remove("show");
  winTheirEl.innerHTML = "";

  if (sharedGame) {
    const them = sharedGame.outcome;
    const v = verdict(me, them);
    winLabelEl.textContent = v === "win" ? "You win" : v === "lose" ? "You lose" : "Tie";
    winValueEl.textContent = fmtResult(me);
    winSubEl.textContent = me.solved
      ? "Solved it"
      : me.distance === 0
      ? "Bang on " + currentTarget
      : me.score + " · " + me.distance + " from " + currentTarget;

    // Reveal the opponent's working and result.
    const title = document.createElement("div");
    title.className = "their-title";
    title.textContent = "They scored " + fmtResult(them) +
      (them.solved ? "" : (them.distance === 0 ? "" : " (" + them.distance + " away)"));
    winTheirEl.appendChild(title);
    (them.working || []).forEach((line) => {
      const d = document.createElement("div");
      d.className = "their-line";
      d.textContent = line;
      winTheirEl.appendChild(d);
    });
    winTheirEl.classList.add("show");
  } else {
    winLabelEl.textContent = me.solved ? "Solved in" : "Your score";
    winValueEl.textContent = fmtResult(me);
    winSubEl.textContent = me.solved
      ? ""
      : me.distance === 0
      ? "Bang on the target!"
      : me.distance + " from " + currentTarget;
  }

  document.body.classList.add("won");
  saveState();
}

/* ---------------- Persistence (survive a page refresh) ---------------- */
const SAVE_KEY = "numbersRound.save.v1";

function currentPhase() {
  if (document.body.classList.contains("won")) return "won";
  if (document.body.classList.contains("playing")) return "play";
  if (currentTarget !== null) return "select";
  return "home";
}

function saveState() {
  const phase = currentPhase();
  if (phase === "home") {
    try { localStorage.removeItem(SAVE_KEY); } catch (e) {}
    return;
  }
  const snapshot = {
    phase: phase,
    currentTarget: currentTarget,
    slotValues: slotValues,
    slotUsed: slotUsed,
    history: history,
    available: available,
    expr: expr,
    justEvaluated: justEvaluated,
    carry: carry,
    lastResult: lastResult,
    lastOutcome: lastOutcome,
    sharedGame: sharedGame,
    borderDurationSec: borderDurationSec,
    startEpoch: startEpoch,
    largeBag: largeBag,
    smallBag: smallBag,
    shareCode: activeShareCode,
  };
  try { localStorage.setItem(SAVE_KEY, JSON.stringify(snapshot)); } catch (e) {}
}

function readSave() {
  try { return JSON.parse(localStorage.getItem(SAVE_KEY)); } catch (e) { return null; }
}

function clearSave() {
  try { localStorage.removeItem(SAVE_KEY); } catch (e) {}
}

// Rebuild a saved game so a refresh lands back where you were.
function restoreState(s) {
  if (!s || s.currentTarget == null) return false;

  currentTarget = s.currentTarget;
  String(currentTarget).padStart(3, "0").split("").forEach((d, i) => {
    if (reels[i]) { reels[i].textContent = d; reels[i].className = "reel"; }
  });

  for (let i = 0; i < SLOT_COUNT; i++) {
    const { up, down, num } = slotParts(i);
    if (s.slotValues && s.slotValues[i] != null) {
      slotValues[i] = s.slotValues[i];
      slotUsed[i] = !!(s.slotUsed && s.slotUsed[i]);
      num.textContent = s.slotValues[i];
      num.className = "slot-num filled" + (slotUsed[i] ? " used" : "");
      up.disabled = true;
      down.disabled = true;
    } else {
      slotValues[i] = null;
      slotUsed[i] = false;
      num.textContent = "00";
      num.className = "slot-num";
    }
  }

  if (s.largeBag) largeBag = s.largeBag.slice();
  if (s.smallBag) smallBag = s.smallBag.slice();
  history = s.history ? s.history.slice() : [];
  available = s.available ? s.available.slice() : [];
  expr = s.expr || "";
  justEvaluated = !!s.justEvaluated;
  carry = s.carry === undefined ? null : s.carry;
  lastResult = s.lastResult === undefined ? null : s.lastResult;
  lastOutcome = s.lastOutcome || null;
  sharedGame = s.sharedGame || null;
  borderDurationSec = s.borderDurationSec || 120;
  startEpoch = s.startEpoch || Date.now();
  activeShareCode = s.shareCode || null;

  renderHistory();
  renderDisplay();

  if (sharedGame) {
    beatEl.textContent = "Beat " +
      (sharedGame.outcome.solved ? fmtTime(sharedGame.outcome.timeSec) : sharedGame.outcome.score);
    beatEl.classList.add("show");
  }

  if (s.phase === "won") {
    if (lastOutcome) endGame(); // re-renders the result screen
    return true;
  }

  if (s.phase === "play") {
    layoutBorder();
    resetBorder();
    const elapsed = (Date.now() - startEpoch) / 1000;
    document.body.classList.remove("time-up", "entering", "raised");
    document.body.classList.add("playing");
    showCalcInstant();
    collapseArrowsInstant();
    runTimerLoop();
    if (elapsed >= borderDurationSec) {
      // Time already up: lock the red ring and reveal submit.
      borderPath.style.animation = "none";
      borderPath.style.stroke = "var(--red)";
      borderPath.style.strokeDashoffset = "0";
      document.body.classList.add("time-up");
    } else {
      // Resume the drain partway through.
      startBorderDrain(elapsed);
    }
    return true;
  }

  // phase === "select": target rolled, numbers maybe drawn, still picking.
  // If all six are already filled, go straight into play (no entrance).
  if (slotValues.every((v) => v !== null)) {
    startPlaying();
    return true;
  }
  setArrowsEnabled(true);
  return true;
}

let toastTimer = null;
function showToast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toastEl.classList.remove("show"), 2000);
}

function encodeGame(payload) {
  return btoa(unescape(encodeURIComponent(JSON.stringify(payload))));
}
function decodeGame(code) {
  return JSON.parse(decodeURIComponent(escape(atob(code))));
}

function sharePuzzle() {
  if (currentTarget === null || !lastOutcome) return;
  const payload = {
    t: currentTarget,
    n: slotValues.slice(),
    s: Math.max(1, Math.round(lastOutcome.timeSec)), // opponent's bar duration
    w: history.slice(),                               // my working
    o: {
      solved: lastOutcome.solved,
      timeSec: Math.round(lastOutcome.timeSec * 10) / 10,
      score: lastOutcome.score,
      distance: lastOutcome.distance,
    },
  };
  const url = new URL(location.href);
  url.search = "?g=" + encodeGame(payload);
  const link = url.toString();
  const blurb = lastOutcome.solved
    ? "Beat my time of " + fmtTime(lastOutcome.timeSec) + "!"
    : "Beat my score of " + lastOutcome.score + "!";
  if (navigator.share) {
    navigator.share({ title: "mth game", text: blurb, url: link }).catch(() => {});
  } else if (navigator.clipboard) {
    navigator.clipboard.writeText(link).then(
      () => showToast("Challenge link copied"),
      () => showToast(link)
    );
  } else {
    showToast(link);
  }
}

winHomeBtn.addEventListener("click", goHome);
winShareBtn.addEventListener("click", sharePuzzle);
submitEl.addEventListener("click", finishSubmitted);

// Open a shared puzzle straight into play mode. Modern links use ?g=<base64>;
// the old ?t=&n= form is still accepted.
function loadFromURL() {
  const p = new URLSearchParams(location.search);
  let data = null;

  const code = p.get("g");
  if (code) {
    try { data = decodeGame(code); activeShareCode = code; } catch (e) { data = null; }
  }
  if (!data) {
    const t = parseInt(p.get("t"), 10);
    const nRaw = p.get("n");
    if (!isNaN(t) && nRaw) {
      const nums = nRaw.split(",").map((s) => parseInt(s, 10));
      if (nums.length === SLOT_COUNT && !nums.some(isNaN)) data = { t: t, n: nums };
    }
  }
  if (!data) return false;

  const t = parseInt(data.t, 10);
  const nums = (data.n || []).map(Number);
  if (isNaN(t) || nums.length !== SLOT_COUNT || nums.some(isNaN)) return false;

  currentTarget = t;
  String(t).padStart(3, "0").split("").forEach((d, i) => {
    if (reels[i]) { reels[i].textContent = d; reels[i].className = "reel"; }
  });
  for (let i = 0; i < SLOT_COUNT; i++) {
    const { up, down, num } = slotParts(i);
    num.textContent = nums[i];
    num.className = "slot-num filled";
    up.disabled = true;
    down.disabled = true;
    slotValues[i] = nums[i];
  }

  if (data.o) {
    sharedGame = {
      t: t,
      n: nums,
      s: data.s,
      outcome: {
        solved: !!data.o.solved,
        timeSec: Number(data.o.timeSec) || 0,
        score: Number(data.o.score),
        distance: Number(data.o.distance),
        working: data.w || [],
      },
    };
    borderDurationSec = data.s && data.s > 0 ? data.s : 120;
    beatEl.textContent = "Beat " +
      (sharedGame.outcome.solved
        ? fmtTime(sharedGame.outcome.timeSec)
        : sharedGame.outcome.score);
    beatEl.classList.add("show");
  } else {
    sharedGame = null;
    borderDurationSec = 120;
    beatEl.classList.remove("show");
  }

  startPlaying();
  return true;
}

/* Pressing the target while playing returns to the home screen showing 000,
   WITHOUT rolling a new number. */
function goHome() {
  if (isRollingTarget) return;
  backToHome();
  currentTarget = null;
  reels.forEach((r) => {
    r.textContent = "0";
    r.className = "reel";
  });
}

function handleTargetPress() {
  if (document.body.classList.contains("playing")) {
    goHome();
  } else {
    rollTarget();
  }
}

function rollTarget() {
  if (isRollingTarget) return;
  isRollingTarget = true;

  backToHome();

  currentTarget = randInt(100, 999);
  const digits = String(currentTarget).split("").map(Number);

  const spinners = reels.map((r) => {
    r.classList.add("spinning");
    r.classList.remove("lock");
    return setInterval(() => { r.textContent = randInt(0, 9); }, 45);
  });

  const stopDelays = [650, 1050, 1450];
  reels.forEach((r, i) => {
    setTimeout(() => {
      clearInterval(spinners[i]);
      r.textContent = digits[i];
      r.classList.remove("spinning");
      r.classList.add("lock");
      if (i === reels.length - 1) {
        isRollingTarget = false;
        setArrowsEnabled(true); // numbers can be drawn now the target exists
        saveState(); // persist the rolled target
      }
    }, stopDelays[i]);
  });
}

targetEl.addEventListener("click", handleTargetPress);
targetEl.addEventListener("keydown", (e) => {
  if (e.key === "Enter" || e.key === " ") {
    e.preventDefault();
    handleTargetPress();
  }
});

/* ---------------- Init ---------------- */
// Tapping the tape reveals every line (and removes the fade); tap again to
// collapse it back.
historyWrapEl.addEventListener("click", () => {
  if (history.length === 0) return;
  historyWrapEl.classList.toggle("expanded");
});

buildSlots();
buildKeys();
renderDisplay();
renderHistory();
setArrowsEnabled(false); // can't draw numbers until a target is generated
layoutBorder();

// On load: restore an in-progress game unless the URL points at a *different*
// shared puzzle (a fresh challenge link). Otherwise open whatever the URL has.
(function init() {
  const urlG = new URLSearchParams(location.search).get("g");
  const saved = readSave();
  if (saved && (!urlG || urlG === saved.shareCode)) {
    if (restoreState(saved)) return;
  }
  if (urlG && saved && urlG !== saved.shareCode) clearSave();
  loadFromURL();
})();
</script>
