padUndoEl.addEventListener("pointercancel", () => { clearTimeout(padUndoBtnTimer); padUndoHoldStop(); });

/* ---------------- Round flow ---------------- */
// Collapse the (already faded) arrows from their natural height to zero, in
// sync with the calculator opening, so the numbers and target each travel
// straight to their final spots with no two-step or dip.
function collapseArrows() {
  const arrows = document.querySelectorAll(".arrow");
  arrows.forEach((a) => {
    const h = a.offsetHeight;
    a.style.transition = "none";
    a.style.maxHeight = h + "px"; // pin current height
  });
  void document.body.offsetHeight; // commit the pinned heights
  arrows.forEach((a) => {
    a.style.transition = ""; // back to the CSS transition
    a.style.maxHeight = "0px";
    a.style.paddingTop = "0";
    a.style.paddingBottom = "0";
  });
}
function collapseArrowsInstant() {
  document.querySelectorAll(".arrow").forEach((a) => {
    a.style.transition = "none";
    a.style.maxHeight = "0px";
    a.style.paddingTop = "0";
    a.style.paddingBottom = "0";
    void a.offsetHeight;
    a.style.transition = "";
  });
}
function resetArrows() {
  document.querySelectorAll(".arrow").forEach((a) => {
    a.style.transition = "none";
    a.style.maxHeight = "";
    a.style.paddingTop = "";
    a.style.paddingBottom = "";
    void a.offsetHeight;
    a.style.transition = "";
  });
}

// Animate the calculator open to its real content height so the rise spans the
// full duration (1:1), keeping it in sync with the arrow collapse.
function raiseCalc() {
  calcEl.style.maxHeight = calcEl.scrollHeight + "px";
}
function showCalcInstant() {
  calcEl.style.transition = "none";
  calcEl.style.maxHeight = "80vh";
  void calcEl.offsetHeight;
  calcEl.style.transition = "";
}
function resetCalc() {
  calcEl.style.transition = "none";
  calcEl.style.maxHeight = "";
  void calcEl.offsetHeight;
  calcEl.style.transition = "";
}

// Immediate play — no entrance (used by shared links and refresh-restore).
function startPlaying() {
  if (document.body.classList.contains("playing")) return;
  if (sharedGame) practiceGame = false; // shared games are always timed
  document.body.classList.toggle("practice", practiceGame);
  document.body.classList.remove("home-timer");
  layoutBorder();
  resetBorder();
  initPages();
  document.body.classList.remove("time-up", "entering", "raised");
  document.body.classList.add("playing");
  showCalcInstant();
  collapseArrowsInstant();
  startTimer();                            // the clock runs in both modes
  startBorder(0);                          // timed drains, shared-practice grows, own practice none
  positionPageDel();
  positionBeat();
  saveState();
}

// Animated entrance from home once all six numbers are drawn:
//  1. full green ring fades in + timer reads 00:00, hold ~1s
//  2. target + numbers rise as the calculator space opens
//  3. calculator + submit fade in
//  4. timer starts and the ring begins draining
let entranceTimers = [];
function beginEntrance() {
  if (document.body.classList.contains("playing") ||
      document.body.classList.contains("entering")) return;
  practiceGame = homeIsPractice(); // shared games never reach here as practice
  document.body.classList.toggle("practice", practiceGame);
  if (gameMode === "ranked" && !sharedGame) consumeRankedTryForGame(); // a ranked game just started -> spend one of the 3 daily tries
  document.body.classList.remove("home-timer");
  initPages();
  layoutBorder();
  resetBorder();                 // full, static green ring
  timerEl.textContent = isTimedGame() ? fmtTime(TIMED_SEC) : "00:00"; // countdown vs stopwatch start
  document.body.classList.remove("time-up");
  document.body.classList.add("entering");
  saveState();
  entranceTimers.forEach(clearTimeout);
  entranceTimers = [];
  const HOLD_MS = 2000;  // hold the full ring + 00:00 with arrows faded out
  const RISE_MS = 800;   // numbers slide up into position
  const FADE_MS = 500;   // calculator fades in
  entranceTimers.push(setTimeout(() => {
    document.body.classList.add("raised");         // numbers rise
    raiseCalc();                                   // calc opens 1:1 with...
    collapseArrows();                              // ...the arrow collapse
    entranceTimers.push(setTimeout(() => {
      document.body.classList.add("playing");      // calc fades in immediately
      calcEl.style.maxHeight = "80vh";             // allow the tape to expand
      entranceTimers.push(setTimeout(() => {
        startTimer();                            // the clock runs in both modes
        startBorder(0);                          // timed drains, shared-practice grows
        positionPageDel();
        saveState();
      }, FADE_MS));
    }, RISE_MS));
  }, HOLD_MS));
}

function backToHome() {
  entranceTimers.forEach(clearTimeout);
  entranceTimers = [];
  cancelAnimationFrame(beatTrackRAF);
  stopRoll();
  stopDraws();
  pbStop();
  stopConfetti();
  replaying = false;
  introT0 = null;
  introDraws = [];
  document.body.classList.remove("playing", "won", "time-up", "entering", "raised", "on-pad", "replay", "beat-on", "practice");
  practiceGame = false;
  resetArrows();
  resetCalc();
  stopTimer();
  resetSlots();
  currentTarget = null; // pristine home: target back to 000 (also re-enables mode-swipe)
  reels.forEach((r) => { r.textContent = "0"; r.className = "reel"; });
  history = [];
  available = [];
  lastResult = null;
  lastOutcome = null;
  sharedGame = null;
  borderDurationSec = TIMED_SEC;
  activeShareCode = null;
  activeChallengeId = null;
  beatEl.classList.remove("show");
  renderHistory();
  renderGenerated();
  collapseTape();
  expr = "";
  lineSum = null;
  lineEntry = null;
  undoStack = [];
  calcPages = [];
  padStrokes = [];
  pageIndex = 1;
  dotsEl.innerHTML = "";
  redrawSketch();
  renderDisplay();
  clearSave();
  refreshHomeTimer(); // show the budget for the current mode (or hide in practice)
  window.history.replaceState({}, "", location.pathname);
}

/* ---------------- Scoring & end of game ---------------- */
function elapsedSeconds() {
  return (Date.now() - startEpoch) / 1000;
}

// Score when you don't cleanly solve: the value you reached plus the sum of any
// numbers you never used. Closer to the target is better. (Pure math in core.)
function computeScore() {
  return coreComputeScore({ reached: lastResult, slotUsed, slotValues });
}

// Make sure a freshly evaluated answer is captured in the tape before we freeze
// the working for sharing.
function flushAnswerToTape() {
  // commit the running sum so the working ends on the final answer
  if (lineSum !== null) {
    history.push(String(lineSum));
    lineSum = null;
    lineEntry = null;
  }
}

// The goal a submission is judged against: 0 if the target was folded into the
// working (winding backwards to zero), otherwise the target itself.
function currentGoal() {
  return goalFor({ targetUsed: !available.some((e) => e.isTarget), target: currentTarget });
}

function finishSolved() {
  flushAnswerToTape();
  lastOutcome = { solved: true, timeSec: elapsedSeconds(), score: currentTarget, goal: currentGoal(), distance: 0 };
  endGame();
}

function finishSubmitted() {
  flushAnswerToTape();
  const score = computeScore();
  // If they used the target, score by how close to 0 they got (they've already
  // built the target in); otherwise by how close to the target they got.
  const goal = currentGoal();
  lastOutcome = {
    solved: false,
    timeSec: elapsedSeconds(),
    score: score,
    goal: goal,
    distance: coreDistance(score, goal),
  };
  endGame();
}

function fmtResult(o) {
  return o.solved ? fmtTime(o.timeSec) : String(o.score);
}

// The number a result was judged against (0 when the target was used). Older
// saved/shared outcomes have no goal field, so fall back to the target.
function goalOf(o) {
  return o && o.goal !== undefined && o.goal !== null ? o.goal : currentTarget;
}

// (verdict() — closer-to-goal-wins comparison — now imported from src/core/scoring.js)

function endGame() {
  stopTimer();
  const me = lastOutcome;
  winTheirEl.classList.remove("show");
  winTheirEl.innerHTML = "";
  let celebrate = false;

  if (sharedGame) {
    const them = sharedGame.outcome;
    const v = verdict(me, them);
    celebrate = v === "win"; // a shared game only celebrates a new record (beating them)
    winLabelEl.textContent = v === "win" ? t("win.youWin") : v === "lose" ? t("win.youLose") : t("win.tie");
    winValueEl.textContent = fmtResult(me);
    winSubEl.textContent = me.solved
      ? t("win.solvedIt")
      : me.distance === 0
      ? t("win.bangOn", { g: goalOf(me) })
      : t("win.score", { s: me.score, d: me.distance, g: goalOf(me) });

    // Their result (always shown) + their working (collapsed; tap the title to expand).
    winTheirEl.classList.remove("open");
    const title = document.createElement("button");
    title.className = "their-title";
    title.textContent = (them.solved || them.distance === 0)
      ? t("win.theyScored", { x: fmtResult(them) })
      : t("win.theyAway", { x: fmtResult(them), d: them.distance });
    title.addEventListener("click", () => winTheirEl.classList.toggle("open"));
    winTheirEl.appendChild(title);
    const work = document.createElement("div");
    work.className = "their-working";
    (them.working || []).forEach((line) => {
      const d = document.createElement("div");
      d.className = "their-line";
      d.textContent = line;
      work.appendChild(d);
    });
    winTheirEl.appendChild(work);
    winTheirEl.classList.add("show");
  } else {
    celebrate = me.solved || me.distance <= 10; // your own game: solved, or within 10 of the goal
    winLabelEl.textContent = me.solved ? t("win.solvedIn") : t("win.yourScore");
    winValueEl.textContent = fmtResult(me);
    winSubEl.textContent = me.solved
      ? ""
      : me.distance === 0
      ? (goalOf(me) === 0 ? t("win.bangZero") : t("win.bangTarget"))
      : t("win.from", { d: me.distance, g: goalOf(me) });
  }

  document.body.classList.add("won");
  // Only practice games are shareable now (ranked feeds the global ranking, so it
  // isn't shared). A received shared puzzle can still be passed on.
  winShareBtn.style.display = (practiceGame || sharedGame) ? "" : "none";
  saveState();
  if (celebrate) launchConfetti();
  if (!sharedGame) recordGameResult(me, !practiceGame);        // own game: count it; ranked also stores details
  else if (activeChallengeId) recordChallengeAttempt(me);      // someone's challenge: record the attempt
}

// Persist a finished own game (fire-and-forget; silent when signed out / offline).
async function recordGameResult(outcome, ranked) {
  try {
    const s = await import("./src/services/stats.js");
    await s.recordGame({
      ranked, distance: outcome.distance, solved: !!outcome.solved,
      timeSec: outcome.timeSec, target: currentTarget, goal: goalOf(outcome), score: outcome.score,
    });
  } catch (e) { /* signed out / offline — nothing to record */ }
}

// Record my attempt at a challenge (with my working, so the creator can view it).
async function recordChallengeAttempt(outcome) {
  const cid = activeChallengeId;
  try {
    const c = await import("./src/services/challenges.js");
    await c.recordAttempt(cid, {
      solved: outcome.solved, score: outcome.score, distance: outcome.distance,
      goal: goalOf(outcome), timeSec: outcome.timeSec, working: history.slice(),
    });
  } catch (e) { /* signed out / offline */ }
}

/* ---------------- Confetti (win / beat) ---------------- */
const confettiEl = document.getElementById("confetti");
const confettiCtx = confettiEl.getContext("2d");
const CONFETTI_COLORS = ["#ff5252", "#ffb142", "#fdd835", "#26de81", "#2bcbba", "#45aaf2", "#a55eea", "#fd79a8", "#00d2d3", "#ff9ff3", "#ff6b6b", "#54a0ff"];
let confettiParts = [], confettiRAF = null, confettiUntil = 0, confettiDPR = 1;

function sizeConfetti() {
  confettiDPR = window.devicePixelRatio || 1;
  confettiEl.width = Math.round(window.innerWidth * confettiDPR);
  confettiEl.height = Math.round(window.innerHeight * confettiDPR);
  confettiEl.style.width = window.innerWidth + "px";
  confettiEl.style.height = window.innerHeight + "px";
}
// Two cannons just off the left/right edges fire small confetti toward the
// centre (near the score), which then drifts slowly down.
function launchConfetti() {
  sizeConfetti();
  const W = window.innerWidth, H = window.innerHeight, cy = H * 0.42;
  confettiParts = [];
  [-1, 1].forEach((side) => {
    const ox = side === -1 ? -12 : W + 12;
    const base = side === -1 ? -Math.PI * 0.25 : -Math.PI * 0.75; // up-right / up-left
    for (let k = 0; k < 70; k++) {
      const ang = base + (Math.random() - 0.5) * Math.PI * 0.4;
      const speed = 13 + Math.random() * 10;
      confettiParts.push({
        x: ox, y: cy + (Math.random() - 0.5) * H * 0.12,
        vx: Math.cos(ang) * speed, vy: Math.sin(ang) * speed,
        w: 3 + Math.random() * 4, h: 5 + Math.random() * 5,
        color: CONFETTI_COLORS[randInt(0, CONFETTI_COLORS.length - 1)],
        rot: Math.random() * Math.PI, vrot: (Math.random() - 0.5) * 0.3,
        wob: Math.random() * Math.PI * 2,
      });
    }
  });
  confettiUntil = Date.now() + 9000;
  document.body.classList.add("confetti-on");
  if (!confettiRAF) confettiRAF = requestAnimationFrame(confettiFrame);
}
function confettiFrame() {
  const W = window.innerWidth, H = window.innerHeight;
  confettiCtx.setTransform(confettiDPR, 0, 0, confettiDPR, 0, 0);
  confettiCtx.clearRect(0, 0, W, H);
  let onscreen = 0;
  for (const p of confettiParts) {
    p.vy += 0.13;          // gentle gravity -> slow fall
    p.vx *= 0.992; p.vy *= 0.992;
    p.x += p.vx; p.y += p.vy; p.wob += 0.12; p.rot += p.vrot;
    if (p.y < H + 24) onscreen++;
    confettiCtx.save();
    confettiCtx.translate(p.x + Math.sin(p.wob) * 2, p.y);
    confettiCtx.rotate(p.rot);
    confettiCtx.fillStyle = p.color;
    confettiCtx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
    confettiCtx.restore();
  }
  if (onscreen > 0 && Date.now() < confettiUntil) {
    confettiRAF = requestAnimationFrame(confettiFrame);
  } else {
    stopConfetti();
  }
}
function stopConfetti() {
  if (confettiRAF) cancelAnimationFrame(confettiRAF);
  confettiRAF = null;
  confettiParts = [];
  confettiCtx.setTransform(confettiDPR, 0, 0, confettiDPR, 0, 0);
  confettiCtx.clearRect(0, 0, window.innerWidth, window.innerHeight);
  document.body.classList.remove("confetti-on");
}

/* ---------------- Persistence (survive a page refresh) ---------------- */

function currentPhase() {
  if (document.body.classList.contains("won")) return "won";
  if (document.body.classList.contains("playing")) return "play";
  if (currentTarget !== null) return "select";
  return "home";
}

function saveState() {
  const phase = currentPhase();
  if (phase === "home") {
    storage.remove(SAVE_KEY);
    return;
  }
  if (pageIndex >= 1) syncActiveCalc();
  // The serializable shape lives in core/gameState.js (introDraws is included so
  // the shareable intro survives a page reload).
  storage.setJSON(SAVE_KEY, buildSnapshot({
    phase, currentTarget, slotValues, calcPages, padStrokes, pageIndex,
    lastOutcome, sharedGame, practiceGame, borderDurationSec, startEpoch,
    largeBag, smallBag, shareCode: activeShareCode, introDraws,
  }));
}

function readSave() {
  return storage.getJSON(SAVE_KEY);
}

function clearSave() {
  storage.remove(SAVE_KEY);
}

// Rebuild a saved game so a refresh lands back where you were.
function restoreState(raw) {
  // Parse/validate off the DOM (core/gameState.js); this function applies it.
  const s = normalizeSnapshot(raw);
  if (!s) return false;

  currentTarget = s.currentTarget;
  String(currentTarget).padStart(3, "0").split("").forEach((d, i) => {
    if (reels[i]) { reels[i].textContent = d; reels[i].className = "reel"; }
  });

  for (let i = 0; i < SLOT_COUNT; i++) {
    const { up, down, num } = slotParts(i);
    if (s.slotValues[i] != null) {
      slotValues[i] = s.slotValues[i];
      num.textContent = s.slotValues[i];
      num.className = "slot-num filled"; // 'used' is applied per active calc below
      up.disabled = true;
      down.disabled = true;
    } else {
      slotValues[i] = null;
      num.textContent = "00";
      num.className = "slot-num";
    }
    slotUsed[i] = false;
  }
  // A restored game has a target/numbers, so it's past the intro — clear any intro
  // word the boot-time refreshHomeTimer() put up while currentTarget was still null.
  refreshHomeTimer();

  if (s.largeBag) largeBag = s.largeBag;
  if (s.smallBag) smallBag = s.smallBag;
  // Re-base introT0 to the last recorded draw so any numbers drawn after the
  // reload continue smoothly (no giant gap from the time away).
  introDraws = s.introDraws;
  introT0 = Date.now() - introDraws.reduce((m, d) => Math.max(m, d.t || 0), 0);
  lastOutcome = s.lastOutcome;
  sharedGame = s.sharedGame;
  practiceGame = s.practiceGame && !sharedGame;
  borderDurationSec = TIMED_SEC; // fixed 2:00 for everyone now
  startEpoch = s.startEpoch || Date.now();
  activeShareCode = s.shareCode;

  calcPages = s.calcPages;        // already normalized (undo stacks dropped)
  padStrokes = s.padStrokes;
  pageIndex = s.pageIndex;
  sizeSketch();

  if (calcPages.length === 0) {
    // Still selecting numbers — no calculators yet.
    available = []; history = []; expr = ""; lineSum = null; lineEntry = null; lastResult = null;
    document.body.classList.remove("on-pad");
    renderHistory(); refreshSlots(); renderGenerated(); renderDisplay();
  } else {
    pageIndex = Math.max(0, Math.min(pageCount() - 1, pageIndex));
    loadCalc(calcPages[pageIndex === 0 ? 0 : pageIndex - 1]);
    document.body.classList.toggle("on-pad", pageIndex === 0);
    renderDots();
  }

  if (sharedGame) {
    refreshBeat();
    beatEl.classList.add("show");
  }

  if (s.phase === "won") {
    if (lastOutcome) endGame(); // re-renders the result screen
    return true;
  }

  if (s.phase === "play") {
    document.body.classList.toggle("practice", practiceGame);
    document.body.classList.remove("home-timer");
    layoutBorder();
    resetBorder();
    document.body.classList.remove("time-up", "entering", "raised");
    document.body.classList.add("playing");
    showCalcInstant();
    collapseArrowsInstant();
    runTimerLoop(); // the clock runs in both modes
    const elapsed = (Date.now() - startEpoch) / 1000;
    if (isTimedGame()) {
      if (elapsed >= borderDurationSec) {
        // Time already up: lock the red ring and reveal submit.
        borderPath.style.animation = "none";
        borderPath.style.stroke = "var(--red)";
        borderPath.style.strokeDashoffset = "0";
        document.body.classList.add("time-up");
      } else {
        startBorderDrain(elapsed); // resume the drain partway through
      }
    } else if (sharedGame && sharedGame.practice) {
      const T = Math.max(1, Math.round((sharedGame.outcome && sharedGame.outcome.timeSec) || 60));
      if (elapsed >= 2 * T) {                 // both laps done -> solid red
        borderPath.style.animation = "none";
        borderPath.style.stroke = "var(--red)";
        borderPath.style.strokeDashoffset = "0";
      } else if (elapsed >= T) {              // into the red lap
        borderGrowSec = T; borderRedGrow = true;
        borderPath.style.stroke = "var(--red)";
        borderPath.style.strokeDashoffset = "";
        borderPath.style.animation = "borderFill " + T + "s linear forwards";
        borderPath.style.animationDelay = "-" + (elapsed - T) + "s";
      } else {
        startBorderGrow(elapsed);             // resume the green lap
      }
    }
    positionPageDel();
    positionBeat();
    return true;
  }

  // phase === "select": target rolled, numbers maybe drawn, still picking.
  // If all six are already filled, go straight into play (no entrance).
  if (slotValues.every((v) => v !== null)) {
    startPlaying();
    return true;
  }
  setArrowsEnabled(true);
  return true;
}

let toastTimer = null;
function showToast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toastEl.classList.remove("show"), 2000);
}

// (encodeGame / decodeGame / parseShareParams live in services/share.js)

// The shareable payload for the just-finished game (null if none). Shared by the
// share button and by posting a game to a group.
function buildSharePayload() {
  if (currentTarget === null || !lastOutcome) return null;
  return {
    t: currentTarget,
    n: slotValues.slice(),
    s: Math.max(1, Math.round(lastOutcome.timeSec)),
    pr: (sharedGame ? sharedGame.practice : practiceGame) ? 1 : 0,
    w: history.slice(),
    intro: introDraws.slice(),
    o: {
      solved: lastOutcome.solved,
      timeSec: Math.round(lastOutcome.timeSec * 10) / 10,
      score: lastOutcome.score,
      goal: lastOutcome.goal,
      distance: lastOutcome.distance,
    },
  };
}
let lastCreatedChallengeId = null; // the last challenge this player created via share (for posting to a group)
async function sharePuzzle() {
  const payload = buildSharePayload();
  if (!payload) return;
  const url = new URL(location.href);
  let link, tracked = false;
  if (authSession) { // signed in -> a tracked challenge (?c=<id>) so attempts show up
    try {
      const id = await (await import("./src/services/challenges.js")).createChallenge(payload);
      if (id) { lastCreatedChallengeId = id; url.search = "?c=" + id; link = url.toString(); tracked = true; }
    } catch (e) { /* offline -> fall back to an encoded link */ }
  }
  if (!link) { url.search = "?g=" + encodeGame(payload); link = url.toString(); }
  const blurb = lastOutcome.solved
    ? t("share.time", { t: fmtTime(lastOutcome.timeSec) })
    : t("share.score", { s: lastOutcome.score });
  // Anonymous shares use the native sheet; tracked shares copy (we awaited, which
  // can block the native share sheet).
  if (!tracked && navigator.share) { navigator.share({ title: "mth game", text: blurb, url: link }).catch(() => {}); return; }
  if (navigator.clipboard) navigator.clipboard.writeText(link).then(() => showToast(t("toast.copied")), () => showToast(link));
  else showToast(link);
}

// Countdown like "3h 12m" until an ISO timestamp (a group's active game freeing up).
function fmtCountdown(iso) {
  const ms = iso ? new Date(iso).getTime() - Date.now() : 0;
  if (!(ms > 0)) return "0m";
  const h = Math.floor(ms / 3600000), m = Math.floor((ms % 3600000) / 60000);
  return h > 0 ? h + "h " + m + "m" : m + "m";
}

}
function resumeFromOverlay() {
  if (menuPausedElapsed !== null && document.body.classList.contains("playing")) {
    startEpoch = Date.now() - menuPausedElapsed * 1000;
    runTimerLoop();
    borderPath.style.animationPlayState = "running";

// Drag-to-close on the overlays: the open sheet follows the finger back toward
// its edge and commits past ~25%, mirroring the open gesture. The menu closes
// upward (sign -1); the help closes downward (sign +1).
function overlaySheetClose(el, sign, onClose) {
  let sy = 0, sx = 0, t0 = 0, on = false, dragging = false;
  el.addEventListener("pointerdown", (e) => { if (e.pointerType === "mouse") return; on = true; dragging = false; sy = e.clientY; sx = e.clientX; t0 = Date.now(); });
  el.addEventListener("pointermove", (e) => {
    if (!on) return;
    const dy = e.clientY - sy, dx = e.clientX - sx;
    if (!dragging) {
      if (Math.abs(dy) < 8 || Math.abs(dy) <= Math.abs(dx)) return; // wait for a clear vertical drag
      dragging = true;
    }
    const closeDelta = sign * dy;                 // > 0 == moving toward closed
    const p = closeDelta <= 0 ? 1 : Math.max(0, Math.min(1, 1 - closeDelta / window.innerHeight));
    el.style.transition = "none";
    el.style.transform = "translateY(" + (sign * (1 - p) * 100) + "%)";
  });
  const end = (e) => {
    if (!on) return; on = false;
    if (!dragging) return;                          // a tap (e.g. a button) — leave it alone
    const closeDelta = sign * (e.clientY - sy);
    el.style.transition = "";
    void el.offsetWidth;
    if (sheetShouldOpen(closeDelta / window.innerHeight, closeDelta, Date.now() - t0)) onClose(); // far enough, or a fast flick
    el.style.transform = "";                        // still-open class animates it back up
  };
  el.addEventListener("pointerup", end);
  el.addEventListener("pointercancel", () => { if (!on) return; on = false; el.style.transition = ""; el.style.transform = ""; });
}

let authMod = null, authSession = null, authUsername = null;
async function authApi() { if (!authMod) authMod = await import("./src/services/auth.js"); return authMod; }
function applyAuthState(session, username) {
  authSession = session; authUsername = username;
  document.body.classList.toggle("signed-in", !!session);
  if (session) document.getElementById("mode-intro").classList.remove("needlogin"); // signed in -> drop the ranked gate prompt
  document.getElementById("nav-help").setAttribute("aria-label", session ? t("auth.profile") : t("auth.help"));
  document.getElementById("guide-profile").textContent = session ? (username || t("auth.setName")) : t("auth.signin");

}
function showAccount(u) { document.getElementById("account-msg").textContent = t("auth.helloName", { u }); setGuideView("account"); }
// Route the account button by state: sign-in form / username setup / account.
function openAccount() {
  if (!authSession) { setGuideView("auth"); setTimeout(() => { const e = document.getElementById("auth-email"); if (e) e.focus(); }, 60); }
  else if (!authUsername) { document.getElementById("username-msg").textContent = ""; setGuideView("username"); }
  else showAccount(authUsername);
}
async function submitAuth() {
  const idField = document.getElementById("auth-email").value.trim();
  const pass = document.getElementById("auth-pass").value;
  const msg = document.getElementById("auth-msg");
  if (!idField || !pass) { msg.textContent = t("auth.needBoth"); return; }
  msg.textContent = t("auth.working");
  try {
    const a = await authApi();
    // Accept an email OR a username. A username with no account can't create one
    // (sign up with your email), so don't fall through to a junk signup.
    const email = await a.resolveLoginEmail(idField);
    if (!email) { msg.textContent = t("auth.noUser"); return; }
    const r = await a.loginOrSignup(email, pass);
    if (r.status === "signedin") {
      document.getElementById("auth-pass").value = "";
      msg.textContent = "";
      const s = await a.getSession();
      let u = await a.getUsername();
      // Retry once past a token-propagation race so an existing account with a
      // username never wrongly lands on the "pick a username" page.
      if (!u) { await new Promise((res) => setTimeout(res, 400)); u = await a.getUsername(); }
      applyAuthState(s, u);
      if (!u) { document.getElementById("username-msg").textContent = ""; setGuideView("username"); }
      else showAccount(u);
    } else if (r.status === "confirm") msg.textContent = t("auth.confirm");
    else if (r.status === "wrongpassword") msg.textContent = t("auth.wrongPass");
    else msg.textContent = r.message || t("auth.err");
  } catch (e) { msg.textContent = t("auth.offline"); }
}
async function saveUsername() {
  const msg = document.getElementById("username-msg");
  msg.textContent = t("auth.working");
  try {
    const r = await (await authApi()).setUsername(document.getElementById("username-input").value);
    if (r.ok) { applyAuthState(authSession, r.username); document.getElementById("username-input").value = ""; showAccount(r.username); }
    else msg.textContent = r.message;
  } catch (e) { msg.textContent = t("auth.offline"); }
}

async function openStats() {
  setGuideView("stats");
  const body = document.getElementById("stats-body");
  body.innerHTML = '<div class="stat-line">' + t("auth.working") + '</div>';
  try { renderStats(await (await import("./src/services/stats.js")).getStats()); }
  catch (e) { body.innerHTML = '<div class="stat-line">' + t("auth.offline") + '</div>'; }
}
function renderStats(st) {
  const body = document.getElementById("stats-body");
  if (!st) { body.innerHTML = '<div class="stat-line">' + t("auth.offline") + '</div>'; return; }
  const rows = st.ranked, n = rows.length;
  let html = '<div class="stats-nums">'
    + '<div class="stat-num"><b>' + st.totalPlayed + '</b><span>' + t("stats.games") + '</span></div>'
    + '<div class="stat-num"><b>' + n + '</b><span>' + t("stats.ranked") + '</span></div>';
  const exact = rows.filter((r) => r.solved || r.distance === 0).length;
  if (n) html += '<div class="stat-num"><b>' + Math.round((exact / n) * 100) + '%</b><span>' + t("stats.exact") + '</span></div>';
  html += '</div>';
  if (!n) { html += '<div class="stat-line">' + t("stats.empty") + '</div>'; body.innerHTML = html; return; }
  // Distance distribution in tens (exact / 1–10 / 11–20 / … / 50+).
  const labels = [t("stats.bucketExact"), "1–10", "11–20", "21–30", "31–40", "41–50", "50+"];
  const counts = new Array(7).fill(0);
  rows.forEach((r) => { counts[r.distance === 0 ? 0 : Math.min(6, Math.ceil(r.distance / 10))]++; });
  const max = Math.max(...counts, 1);
  html += '<div class="stat-bars">';
  for (let i = 0; i < 7; i++) html +=
    '<div class="stat-bar"><div class="lbl">' + labels[i] + '</div>'
    + '<div class="track"><div class="fill" style="width:' + (counts[i] / max) * 100 + '%"></div></div>'
    + '<div class="cnt">' + counts[i] + '</div></div>';
  html += '</div>';
  // Solve times.
  const solves = rows.filter((r) => r.solved || r.distance === 0);
  if (solves.length) {
    const avg = solves.reduce((a, r) => a + Number(r.time_sec), 0) / solves.length;
    const fastest = Math.min(...solves.map((r) => Number(r.time_sec)));
    html += '<div class="stat-line">' + t("stats.avgSolve", { t: fmtTime(Math.round(avg)) }) + ' · ' + t("stats.fastest", { t: fmtTime(Math.round(fastest)) }) + '</div>';
  }
  // Trend: recent vs earlier average distance.
  if (n >= 6) {
    const k = Math.min(10, Math.floor(n / 2));
    const avgD = (arr) => arr.reduce((a, r) => a + r.distance, 0) / arr.length;
    const rD = avgD(rows.slice(-k)), eD = avgD(rows.slice(0, -k));
    const arrow = rD < eD - 0.5 ? " ▾" : rD > eD + 0.5 ? " ▴" : "";
    html += '<div class="stat-line">' + t("stats.recent", { k, d: Math.round(rD) }) + arrow + '</div>';
  }
  body.innerHTML = html;
}

function gOut(o) { return { distance: Number(o.distance) || 0, timeSec: Number(o.timeSec != null ? o.timeSec : o.time_sec) || 0, solved: !!o.solved }; }
function gRes(o) { return o.solved ? t("games.solvedIn", { t: fmtTime(Math.round(o.timeSec)) }) : t("games.off", { d: o.distance }); }

async function openH2H() {
  setGuideView("h2h");
  const body = document.getElementById("h2h-body");
  body.innerHTML = '<div class="stat-line">' + t("auth.working") + '</div>';
  try {
    const c = await import("./src/services/challenges.js");
    const [sent, played] = await Promise.all([c.listSent(), c.listPlayed()]);
    const map = new Map();
    const tally = (uname, mine, theirs) => {
      if (!uname || uname === authUsername) return;
      if (!map.has(uname)) map.set(uname, { username: uname, games: 0, wins: 0, losses: 0 });
      const e = map.get(uname); e.games++;
      const v = verdict(mine, theirs);
      if (v === "win") e.wins++; else if (v === "lose") e.losses++;
    };
    // My challenges: I'm the benchmark (payload.o), each attempter is an opponent.
    sent.forEach((ch) => { const mine = gOut(ch.payload.o); (ch.attempts || []).forEach((a) => tally(a.username, mine, gOut(a))); });
    // Challenges I played: my attempt vs the creator's benchmark.
    played.forEach((p) => tally(p.challenge.creator_username, gOut(p.attempt), gOut(p.challenge.payload.o)));
    const rows = [...map.values()].sort((a, b) => b.games - a.games || b.wins - a.wins);
    if (!rows.length) { body.innerHTML = '<div class="stat-line">' + t("h2h.empty") + '</div>'; return; }
    let html = '<div class="lb">';
    rows.forEach((r) => {
      html += '<div class="lb-row"><span class="who">' + escHtml(r.username) + '</span><span class="res">' + t("h2h.record", { w: r.wins, l: r.losses, n: r.games }) + '</span></div>';
    });
    body.innerHTML = html + '</div>';
  } catch (e) { body.innerHTML = '<div class="stat-line">' + t("auth.offline") + '</div>'; }
}

function tourDemoCalc() {
  if (history.length > 0) return; // sample 100 × 8 = 800 so the tape isn't empty
  const a = available.find((e) => e.slotIndex === 0), b = available.find((e) => e.slotIndex === 2);
  if (a && b) { playNumber(a); playNumber(b); if (history.length === 0) evaluate(); }
}
// Launched from the help sheet. The walkthrough runs a throwaway demo that
// overwrites the live game, so first remember what to return to — a shared game
// still in its intro (replay it), any game in progress (snapshot + restore), or
// nothing (home). We hide the sheet WITHOUT resuming so the capture is of the
// paused state.
let tourReturn = null;
function beginWalkthrough() {
  if (sharedGame && document.body.classList.contains("replay")) {
    tourReturn = { shared: sharedGame, draws: introDraws.slice(), code: activeShareCode };
  } else if (currentTarget !== null || document.body.classList.contains("playing")) {
    saveState();
    tourReturn = { snap: storage.getJSON(SAVE_KEY) };
  } else {
    tourReturn = null; // launched from a pristine home
  }
  document.body.classList.remove("guide-open");
  startTour();
}
function startTour() {
  tourIndex = 0;
  setMode("practice");   // the demo needs the target/numbers, which the multiplayer page hides
  document.body.classList.add("tour-on");
  showTourStep();
}
function endTour() {
  document.body.classList.remove("tour-on");
  const ret = tourReturn; tourReturn = null;
  if (ret && ret.shared) {                 // resume the shared game from its intro (as if the sheet was closed)
    sharedGame = ret.shared; introDraws = ret.draws.slice(); activeShareCode = ret.code;
    restartShared();
  } else if (ret && ret.snap) {            // pick the in-progress game back up
    restoreState(ret.snap);
  } else {
    goHome();
  }
}
function tourNext() {
  if (tourIndex >= TOUR_STEPS.length - 1) { endTour(); return; }
  tourIndex++;
  showTourStep();
}
function tourPrev() {
  if (tourIndex === 0) return;
  tourIndex--;
  showTourStep();
}
function showTourStep() {
  const step = TOUR_STEPS[tourIndex];
  if (step.setup) step.setup();
  renderTourStep();          // text + an initial position
  setTimeout(renderTourStep, 90); // re-position once the layout settles
}
function renderTourStep() {
  const step = TOUR_STEPS[tourIndex];
  document.getElementById("tour-text").textContent = (t("walk")[tourIndex] || "");
  document.getElementById("tour-next").textContent = (tourIndex === TOUR_STEPS.length - 1) ? t("tour.done") : t("tour.next");
  positionTour(step.el && step.el());
}
function positionTour(el) {
  const ring = document.getElementById("tour-ring");
  const arrow = document.getElementById("tour-arrow");
  const note = document.getElementById("tour-note");
  const H = window.innerHeight;
  if (!el) { // no element (e.g. the scoring slide) — centre the note over a full dim
    arrow.style.display = "none";
    ring.style.display = "block"; // 0x0 ring at centre = whole-screen dim, no visible hole
    ring.style.left = "50%"; ring.style.top = "50%";
    ring.style.width = "0px"; ring.style.height = "0px";
    note.style.bottom = "auto";
    note.style.top = "50%";
    note.style.transform = "translate(-50%, -50%)";
    return;
  }
  note.style.transform = "translateX(-50%)";
  ring.style.display = arrow.style.display = "block";
  const r = el.getBoundingClientRect();
  const pad = 8;
  ring.style.left = (r.left - pad) + "px";
  ring.style.top = (r.top - pad) + "px";
  ring.style.width = (r.width + pad * 2) + "px";
  ring.style.height = (r.height + pad * 2) + "px";
  // note opposite the element so it never covers it. Pin only ONE edge ("auto"
  // on the other — clearing to "" would fall back to the stylesheet's bottom and
  // stretch the box full-height).
  const low = (r.top + r.height / 2) > H * 0.55;
  if (low) { note.style.top = "calc(8dvh + env(safe-area-inset-top, 0px))"; note.style.bottom = "auto"; }
  else { note.style.bottom = "calc(7dvh + env(safe-area-inset-bottom, 0px))"; note.style.top = "auto"; }
  // arrow points at the ring: above it (pointing down) unless it's near the top
  const aw = arrow.offsetWidth || 120, ah = arrow.offsetHeight || 120;
  const cx = r.left + r.width / 2;
  if (r.top < H * 0.18) { // element near the top -> arrow below, pointing up
    arrow.style.transform = "scaleY(-1)";
    arrow.style.left = (cx - 0.84 * aw) + "px";
    arrow.style.top = (r.bottom + 6 - 0.24 * ah) + "px";
  } else {
    arrow.style.transform = "none";
    arrow.style.left = (cx - 0.84 * aw) + "px";
    arrow.style.top = (r.top - 6 - 0.76 * ah) + "px";
  }
}
document.getElementById("tour-next").addEventListener("click", tourNext);
document.getElementById("tour-exit").addEventListener("click", endTour);
// Tap the right half of the screen for the next step, the left half for the previous.
document.getElementById("tour").addEventListener("click", (e) => {
  if (e.target.closest(".tour-note")) return; // the Exit/Next buttons handle their own taps
  if (e.clientX < window.innerWidth / 2) tourPrev();
  else tourNext();
});
window.addEventListener("resize", () => { if (document.body.classList.contains("tour-on")) renderTourStep(); });

// Open a shared puzzle straight into play mode. Modern links use ?g=<base64>;
// the old ?t=&n= form is still accepted.
function loadFromURL() {
  const { data, code } = parseShareParams(location.search);
  if (code) activeShareCode = code; // remember the ?g= code for refresh-restore
  if (!data) return false;
  return playSharedData(data, code);
}

// Open a shared puzzle payload (from a ?g= decode or a fetched ?c= challenge).
function playSharedData(data, code, gate = true) {
  const t = parseInt(data.t, 10);
  const nums = (data.n || []).map(Number);
  if (isNaN(t) || nums.length !== SLOT_COUNT || nums.some(isNaN)) return false;

  // Apply the opponent's result/banner (called after any backToHome that clears it).
  function setShared() {
    if (data.o) {
      sharedGame = {
        t: t, n: nums, s: data.s,
        practice: !!data.pr, // sender's game was practice -> a growing ring, not draining
        outcome: {
          solved: !!data.o.solved,
          timeSec: Number(data.o.timeSec) || 0,
          score: Number(data.o.score),
          goal: data.o.goal === undefined ? undefined : Number(data.o.goal),
          distance: Number(data.o.distance),
          working: data.w || [],
        },
      };
      borderDurationSec = TIMED_SEC; // a shared TIMED game still gives the receiver the full 2:00
      practiceGame = false; // the receiver isn't in their own practice mode (sharedGame.practice drives the ring)
      document.body.classList.remove("home-timer");
      refreshBeat();              // the green "Beat X" banner (time/score to beat)
      beatEl.classList.add("show");
    } else {
      sharedGame = null;
      borderDurationSec = TIMED_SEC;
      beatEl.classList.remove("show");
    }
  }

  // A recorded intro -> replay it (target roll + draws at the original rate).
  const hasIntro = Array.isArray(data.intro) && data.intro.length === SLOT_COUNT &&
    data.intro.every((d) => d && typeof d.i === "number" && typeof d.t === "number");
  if (hasIntro) {
    // Open the target roll, then (for a fresh shared link) gate on the help/profile
    // sheet before the numbers draw. Group games pass gate:false — you already chose
    // to play, so it runs straight through.
    playIntro(t, nums, data.intro, gate); // does backToHome, sets up + schedules the replay
    activeShareCode = code || null; // backToHome cleared it
    setShared();
    return true;
  }

  // Old links with no recorded intro: jump straight in.
  currentTarget = t;
  String(t).padStart(3, "0").split("").forEach((d, i) => {
    if (reels[i]) { reels[i].textContent = d; reels[i].className = "reel"; }
  });
  for (let i = 0; i < SLOT_COUNT; i++) {
    const { up, down, num } = slotParts(i);
    num.textContent = nums[i];
    num.className = "slot-num filled";
    up.disabled = true;
    down.disabled = true;
    slotValues[i] = nums[i];
  }
  setShared();
  startPlaying();
  return true;
}

// A tracked challenge link (?c=<id>): fetch the puzzle, then play it like a share.
// activeChallengeId is set AFTER playSharedData (playIntro's backToHome clears it),
// so the attempt gets recorded on finish.
async function loadChallenge(id, gate = true) {
  try {
    const c = await (await import("./src/services/challenges.js")).getChallenge(id);
    if (!c || !c.payload) { goHome(); return false; }
    const ok = playSharedData(c.payload, null, gate);
    if (ok) activeChallengeId = id;
    return ok;
  } catch (e) { goHome(); return false; }
}

/* Pressing the target while playing returns to the home screen showing 000,
   WITHOUT rolling a new number. */
function goHome() {
  if (isRollingTarget) return;
  backToHome();
  currentTarget = null;
  reels.forEach((r) => {
    r.textContent = "0";
    r.className = "reel";
  });
}

function handleTargetPress() {
  if (targetHeld) { targetHeld = false; return; } // a hold-to-reset already handled it
  if (replaying) return; // watching a shared intro — no interaction
  if (document.body.classList.contains("playing")) {
    // v2: click the target to place its value (usable once, like a number).
    const e = available.find((x) => x.isTarget && !x.tentative);
    if (e) playNumber(e);
  } else {
    rollTarget(); // ranked re-rolls are FREE — a try is only spent when the game starts (beginEntrance)
  }
}
// A ranked game just committed (all six drawn) -> spend one of the 3 daily tries.
// Fire-and-forget; updates the "N left today" display. Degrades silently if the
// RPC is absent/offline (no limit enforced).
async function consumeRankedTryForGame() {
  try {
    const left = await (await import("./src/services/stats.js")).consumeRankedTry();
    if (left !== null && left >= 0) { rankedTries = left; }
    else refreshRankedTries();
  } catch (e) {}
}

function stopRoll() {
  rollTimers.forEach((id) => { clearInterval(id); clearTimeout(id); });
  rollTimers = [];
  isRollingTarget = false;
}

function rollTarget() {
  if (isRollingTarget) return;
  if (gameMode === "multiplayer" && !sharedGame) return; // multiplayer is "coming soon" — no game to start
  backToHome();          // clean slate (also stops any prior roll)
  isRollingTarget = true;
  introT0 = Date.now();  // start recording the intro for a shareable replay
  introDraws = [];

  currentTarget = randInt(100, 999);
  const digits = String(currentTarget).split("").map(Number);

  const spinners = reels.map((r) => {
    r.classList.add("spinning");
    r.classList.remove("lock");
    const id = setInterval(() => { r.textContent = randInt(0, 9); }, 45);
    rollTimers.push(id);
    return id;
  });

  const stopDelays = [650, 1050, 1450];
  reels.forEach((r, i) => {
    rollTimers.push(setTimeout(() => {
      clearInterval(spinners[i]);
      r.textContent = digits[i];
      r.classList.remove("spinning");
      r.classList.add("lock");
      if (i === reels.length - 1) {
        isRollingTarget = false;
        rollTimers = [];
        setArrowsEnabled(true); // numbers can be drawn now the target exists
        saveState(); // persist the rolled target
      }
    }, stopDelays[i]));
  });
}

/* ---------------- Shared-game intro playback ---------------- */
// A shared link replays the original intro — the target rolling and the six
// numbers being drawn at the rate the sharer did — so everyone gets the same
// time to digest the puzzle. It all runs off one pausable clock (pbTick), so
// opening the menu freezes it.
let pbEvents = [], pbStart = 0, pbPausedElapsed = null, pbTimer = null;
let pbNums = [], pbTargetDigits = [];
let pbSpinReel = [false, false, false];
let pbSpinSlot = new Array(SLOT_COUNT).fill(false);

function pbTick() {
  if (pbPausedElapsed !== null) return;
  const elapsed = Date.now() - pbStart;
  for (const e of pbEvents) {
    if (pbPausedElapsed !== null) break;   // an event just paused us (e.g. the shared gate) — stop firing the rest
    if (!e.done && elapsed >= e.t) { e.done = true; try { e.fn(); } catch (_) {} }
  }
  for (let i = 0; i < 3; i++) if (pbSpinReel[i]) reels[i].textContent = randInt(0, 9);
  for (let i = 0; i < SLOT_COUNT; i++) if (pbSpinSlot[i]) slotParts(i).num.textContent = (pbNums[i] <= 10 ? randInt(1, 9) : randInt(10, 99));
  if (pbEvents.some((e) => !e.done)) pbTimer = setTimeout(pbTick, 45);
}
function pbPause() {
  if (pbPausedElapsed !== null || !pbEvents.length) return;
  pbPausedElapsed = Date.now() - pbStart;
  clearTimeout(pbTimer);
}
function pbResume() {
  if (pbPausedElapsed === null) return;
  pbStart = Date.now() - pbPausedElapsed;
  pbPausedElapsed = null;
  pbTick();
}
function pbStop() {
  clearTimeout(pbTimer);
  pbEvents = []; pbPausedElapsed = null;
  pbSpinReel = [false, false, false];
  pbSpinSlot = new Array(SLOT_COUNT).fill(false);
}

function playIntro(t, nums, draws, gate) {
  backToHome();                       // clean slate (clears replay/intro)
  replaying = true;
  document.body.classList.add("replay");
  document.body.classList.remove("home-timer", "mode-intro-on"); // never the home intro word during a replay
  currentTarget = t;
  introDraws = draws.slice();         // keep so a re-share replays too
  pbNums = nums.slice();
  pbTargetDigits = String(t).padStart(3, "0").split("").map(Number);
  reels.forEach((r) => { r.textContent = "0"; r.className = "reel"; });
  for (let i = 0; i < SLOT_COUNT; i++) {
    const { up, down, num } = slotParts(i);
    num.textContent = "00"; num.className = "slot-num"; up.disabled = true; down.disabled = true;
  }
  pbSpinReel = [false, false, false];
  pbSpinSlot = new Array(SLOT_COUNT).fill(false);

  const ev = [];
  // target roll (same stagger as rollTarget)
  ev.push({ t: 0, fn: () => { pbSpinReel = [true, true, true]; reels.forEach((r) => r.classList.add("spinning")); } });
  [650, 1050, 1450].forEach((st, idx) => ev.push({ t: st, fn: () => {
    pbSpinReel[idx] = false;
    reels[idx].textContent = pbTargetDigits[idx];
    reels[idx].classList.remove("spinning"); reels[idx].classList.add("lock");
  } }));
  // A shared link opens the help/profile sheet (log in / how to play) at the VERY
  // START and PAUSES there — before the target even rolls — so nothing is revealed
  // until the recipient closes the sheet. Closing it resumes the whole intro (target
  // roll → number draws → play) from the beginning. (t:-1 so it fires before the t:0
  // roll event; pbTick breaks its loop the moment the pause lands, so the roll waits.)
  if (gate) ev.push({ t: -1, fn: () => { openGuide(); } });
  // number draws at their recorded times
  let maxEnd = 1450;
  draws.forEach((d) => {
    ev.push({ t: d.t, fn: () => { pbSpinSlot[d.i] = true; slotParts(d.i).num.classList.add("spinning"); } });
    const end = d.t + 420;
    maxEnd = Math.max(maxEnd, end);
    ev.push({ t: end, fn: () => {
      pbSpinSlot[d.i] = false;
      const num = slotParts(d.i).num;
      num.textContent = pbNums[d.i]; num.classList.remove("spinning"); num.classList.add("filled", "lock");
      slotValues[d.i] = pbNums[d.i];
    } });
  });
  // reveal the "Beat X" banner as soon as the last number lands
  ev.push({ t: maxEnd, fn: () => { document.body.classList.add("beat-on"); } });
  // entrance (same beats as beginEntrance, but on the pausable clock)
  const HOLD = 2000, RISE = 800, FADE = 500, beat = maxEnd + 450;
  ev.push({ t: beat, fn: () => {
    initPages(); layoutBorder(); resetBorder();
    timerEl.textContent = isTimedGame() ? fmtTime(TIMED_SEC) : "00:00";
    document.body.classList.remove("time-up"); document.body.classList.add("entering");
    positionBeat();
  } });
  ev.push({ t: beat + HOLD, fn: () => { document.body.classList.add("raised"); raiseCalc(); collapseArrows(); trackBeatFor(RISE + 120); } });
  ev.push({ t: beat + HOLD + RISE, fn: () => { document.body.classList.add("playing"); calcEl.style.maxHeight = "80vh"; positionBeat(); } });
  ev.push({ t: beat + HOLD + RISE + FADE, fn: () => {
    startTimer(); startBorder(0); positionPageDel(); positionBeat();
    replaying = false; document.body.classList.remove("replay");
    saveState();
  } });

  pbEvents = ev.map((e) => ({ t: e.t, fn: e.fn, done: false })).sort((a, b) => a.t - b.t);
  pbStart = Date.now(); pbPausedElapsed = null;
  clearTimeout(pbTimer);
  pbTick();
}

targetEl.addEventListener("click", handleTargetPress);
targetEl.addEventListener("keydown", (e) => {
  if (e.key === "Enter" || e.key === " ") {
    e.preventDefault();
    handleTargetPress();
  }
});
// Press and hold the generated target on the home screen to clear it back to 000
// (re-enabling the mode swipe). A normal tap still re-rolls a new target.
let targetHoldTimer = null, targetHeld = false, targetDownX = 0, targetDownY = 0;
targetEl.addEventListener("pointerdown", (e) => {
  targetHeld = false;
  targetDownX = e.clientX; targetDownY = e.clientY;
  if (!document.body.classList.contains("playing") && !replaying && currentTarget !== null) {
    clearTimeout(targetHoldTimer);
    targetHoldTimer = setTimeout(() => { targetHeld = true; goHome(); }, 500);
  }
});
targetEl.addEventListener("pointermove", (e) => {
  if (targetHoldTimer && Math.hypot(e.clientX - targetDownX, e.clientY - targetDownY) > 10) clearTimeout(targetHoldTimer);
});
targetEl.addEventListener("pointerup", () => clearTimeout(targetHoldTimer));
targetEl.addEventListener("pointercancel", () => clearTimeout(targetHoldTimer));

/* ---------------- Init ---------------- */
// Collapse the tape and release the layout pin.
function collapseTape() {
  historyWrapEl.classList.remove("expanded");
  document.body.classList.remove("tape-open");
  stageEl.style.alignItems = "";
  document.querySelector(".content").style.marginTop = "";
}
// Reveal every line: pin the column where it is so the target + numbers stay put
// and the calculator (keypad hidden) grows DOWNWARD instead of pushing them up.
function expandTape() {
  if (history.length === 0) return;
  const content = document.querySelector(".content");
  const stageTop = stageEl.getBoundingClientRect().top;
  const padTop = parseFloat(getComputedStyle(stageEl).paddingTop) || 0;
  const offset = content.getBoundingClientRect().top - stageTop - padTop;
  stageEl.style.alignItems = "flex-start";    // anchor the top so it grows down
  content.style.marginTop = Math.max(0, offset) + "px";
  historyWrapEl.classList.add("expanded");
  document.body.classList.add("tape-open");   // hides the keypad
}
historyWrapEl.addEventListener("click", () => {
  // A press-and-hold armed the delete instead of toggling the tape.
  if (document.body.classList.contains("del-armed")) return;
  if (historyWrapEl.classList.contains("expanded")) collapseTape();
  else expandTape();
});
// (A centre tap when the tape is open collapses it — handled in the nav click
// above — while side taps still navigate.)

buildSlots();
buildKeys();
renderDisplay();
renderHistory();
setArrowsEnabled(false); // can't draw numbers until a target is generated
layoutBorder();
sizeSketch();
setLang(storage.get(LANG_KEY) === "ko" ? "ko" : "en");
gameMode = "practice"; // always open on practice so ranked games are never started by accident
applyTheme(storage.get(THEME_KEY) || "light");
applyScale(storage.get(SCALE_KEY) || 1);
applyAutoEqual((storage.get(AUTOEQ_KEY) || "on") !== "off");
applyAutoSign(storage.get(AUTOSIGN_KEY) || "x");
applyLang();
refreshHomeTimer(); // show 02:00 on the home screen in timed mode

// On load: restore an in-progress game unless the URL points at a *different*
// shared puzzle (a fresh challenge link). Otherwise open whatever the URL has.
(function init() {
  const params = new URLSearchParams(location.search);
  const urlC = params.get("c");
  if (urlC) { clearSave(); loadChallenge(urlC); return; } // tracked challenge — always fresh
  const urlG = params.get("g");
  const saved = readSave();
  if (saved && (!urlG || urlG === saved.shareCode)) {
    if (restoreState(saved)) return;
  }
  if (urlG && saved && urlG !== saved.shareCode) clearSave();
  loadFromURL();
})();

// Dev-only test bridge: lets the local preview harness drive the game now that
// the code is an ES module (functions are no longer global). Guarded to
// localhost, so it is completely inert on the deployed site.
if (location.hostname === "localhost" || location.hostname === "127.0.0.1") {
  window.__t = {
    backToHome, setMode, startPlaying, playNumber, pressKey, applyAutoEqual, handleEquals,
    finishSubmitted, finishSolved, evaluate,
    setup(target, vals) {
      backToHome(); currentTarget = target;
      vals.forEach((v, i) => { slotValues[i] = v; const p = slotParts(i); p.num.textContent = v; p.num.className = "slot-num filled"; });
      practiceGame = false; startPlaying();
    },
    play(idx) { playNumber(available.find((e) => e.slotIndex === idx && !e.tentative)); },
    rollTarget, drawInto,
    intro() { return { introT0, introDraws: introDraws.slice(), isRolling: isRollingTarget }; },
    sharePayload() {
      // mirrors sharePuzzle()'s payload (the part that matters for the intro)
      return { pr: (sharedGame ? sharedGame.practice : practiceGame) ? 1 : 0,
        intro: introDraws.slice(), introLen: introDraws.length };
    },
    state() {
      return { expr, lineSum, lastResult, display: displayValEl.textContent, displayCls: displayEl.className,
        outcome: lastOutcome, slotUsed: slotUsed.slice(), currentTarget };
    },
    renderStats(st) { openGuide(); setGuideView("stats"); renderStats(st); },
  };
}
