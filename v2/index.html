<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<!-- viewport-fit=cover: let the page (and the green ring) paint all the way to
     the physical screen edges, into the notch / home-indicator safe areas. -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<!-- Tints the browser chrome / status bar (Android Chrome, iOS Safari 15+) to
     match the theme; updated live by applyTheme(). color-scheme is driven from
     CSS (:root vs :root.dark) so native areas + form controls follow too. -->
<meta name="theme-color" id="theme-color-meta" content="#ffffff" />
<!-- Apply the saved theme BEFORE first paint, so the html background + status-bar
     tint are correct on load (iOS reads theme-color early and won't always re-read
     a later JS change). -->
<script>
  (function () {
    try {
      if (localStorage.getItem("numbersRound.theme.v2") === "dark") {
        document.documentElement.classList.add("dark");
        var m = document.getElementById("theme-color-meta");
        if (m) m.setAttribute("content", "#14161a");
      }
    } catch (e) {}
  })();
</script>
<!-- Added-to-home-screen runs fullscreen, so the ring wraps the whole screen. -->
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>mth game</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@300;500;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #ffffff;
    --ink: #111;
    --grey: #c9c9c9;
    --dim: #444;            /* spinning reels etc. — readable on the bg */
    --green: #1ec96f;
    --red: #e8503a;
    --font: "Roboto Mono", ui-monospace, "Courier New", monospace;
    /* Sheet motion: ramps up, then eases off gradually the last stretch (springy). */
    --ease-spring: cubic-bezier(0.5, 0, 0.2, 1);
    --dur-sheet: 0.42s;

    /* One width drives the column AND every text size, so they scale together
       and stop growing once the column is capped. --scale (menu slider) shrinks
       the whole column proportionally; timer/dots spacing is dvh-based so it's
       unaffected and the column stays centred. */
    --scale: 1;                                 /* 1 = large (default); slider 0.6–1.0 */
    --app-w: calc(min(60vw, 310px) * var(--scale)); /* mobile: ~60% of the screen */
    --size-target: calc(var(--app-w) * 0.15);   /* the 000 target — hero size */
    --size-number: calc(var(--app-w) * 0.066);  /* six numbers + main calc line */
    --size-ui: calc(var(--app-w) * 0.05);        /* timer, keys, tape, buttons */

    /* Opacity convention: anything you cannot click sits at 20%. */
    --muted: rgba(17, 17, 17, 0.2);
    --grid: #ececec;       /* sketchpad grid lines */
    color-scheme: light;   /* native areas / form controls follow the theme */
  }
  /* Dark theme — defined on the <html> element (:root.dark) so the html
     background (and therefore the safe-area / browser-chrome region) goes dark
     too, not just <body>. The .dark class is toggled on BOTH html and body. */
  :root.dark, body.dark {
    --bg: #14161a;
    --ink: #ececec;
    --grey: #5a5e66;
    --dim: #b0b0b0;
    --muted: rgba(236, 236, 236, 0.25);
    --grid: #24262c;
  }
  :root.dark { color-scheme: dark; }
  @media (min-width: 768px) {
    :root { --app-w: calc(min(33vw, 310px) * var(--scale)); } /* desktop: ~a third, capped */
  }
  * { box-sizing: border-box; }
  /* Lock the viewport: the page itself never scrolls or rubber-bands. Only the
     expanded calculation tape scrolls, internally. */
  html, body {
    height: 100%;
    overflow: hidden;
    overscroll-behavior: none;
  }
  html { background: var(--bg); }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--font);
    /* House style: everything lowercase. Opt an element out with
       `text-transform: none` when a label needs its own casing. */
    text-transform: lowercase;
    -webkit-font-smoothing: antialiased;
    transition: background 0.25s ease, color 0.25s ease;
    /* No double-tap-to-zoom (it fired when tapping the clear key quickly). */
    touch-action: manipulation;
    /* Holding a key must not select its text or pop the iOS callout/highlight. */
    -webkit-user-select: none;
    -moz-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
    -webkit-tap-highlight-color: transparent;
  }
  /* Form controls don't inherit text-transform on their own — pull the house
     lowercase through so buttons/inputs match the rest of the text. */
  button, input, select, textarea { text-transform: inherit; }
  button { -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }

  /* Green perimeter indicator — one continuous bar, browser-animated */
  .border {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 50;
    opacity: 0;
    transition: opacity 1s ease; /* gentle fade-in */
  }
  body.entering:not(.practice) .border, body.playing:not(.practice) .border { opacity: 1; }
  .border path {
    fill: none;
    stroke: var(--green);
    stroke-width: 10;
    stroke-linejoin: round;
    stroke-linecap: round;
    stroke-dasharray: 1000 1000; /* pathLength=1000 -> one full lap */
    stroke-dashoffset: 0;        /* full ring by default */
    will-change: stroke-dashoffset;
  }
  /* The ring starts full and drains away clockwise over the round (animation
     applied in JS once the calculator appears). When empty, a red ring grows
     clockwise for one rotation, then stays solid red. */
  @keyframes borderDrain {
    from { stroke-dashoffset: 0; }     /* full perimeter */
    to   { stroke-dashoffset: -1000; } /* empty, draining clockwise */
  }
  /* Grows clockwise from empty to full (shared practice games). */
  @keyframes borderFill {
    from { stroke-dashoffset: 1000; }  /* empty */
    to   { stroke-dashoffset: 0; }     /* full */
  }
  /* Runs alongside the drain: holds green, then snaps to red at the end of its
     own (shorter) duration — the halfway mark on a 2:00 timed game. */
  @keyframes borderHalf {
    0%, 99.99% { stroke: var(--green); }
    100%       { stroke: var(--red); }
  }

  /* Timer — muted while the clock runs; clickable during play to open the menu. */
  .timer {
    position: fixed;
    top: 5vh;
    top: calc(5dvh + env(safe-area-inset-top, 0px));
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    font-size: var(--size-ui);
    font-weight: 700;
    letter-spacing: 0.15em;
    color: var(--muted);
    z-index: 40;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s, color 0.3s;
  }
  /* The timer (a stopwatch) shows during entering/playing in BOTH modes. On the
     timed home it shows the 02:00 budget. NOT shown during the shared-intro roll
     (the menu icon is up then) — it takes over once the numbers land (entering). */
  body.entering .timer,
  body.playing .timer,
  body.home-timer .timer { opacity: 1; }
  /* The home 02:00 budget uses the same muted colour as the running clock does
     during play (no full-strength override) — hover still darkens it (below). */
  /* On home in timed mode the 02:00 sits where the hamburger would — so it
     doubles as the menu button (tap it, like the timer during play) and the
     hamburger hides to avoid overlapping it. */
  body.playing .timer,
  body.home-timer .timer { pointer-events: auto; cursor: pointer; }
  body.home-timer #nav-menu { opacity: 0; pointer-events: none; }
  body.playing .timer:hover, body.home-timer .timer:hover { color: var(--ink); }

  /* Submit lives in the timer/pause menu now (see #menu-submit). */

  /* Home-screen icons (hamburger / profile). Shown only on the home screen;
     they fade out once a game is entering / playing / won. */
  .nav-icon {
    position: fixed;
    left: 50%;
    transform: translateX(-50%);
    background: none;
    border: none;
    color: var(--ink);
    cursor: pointer;
    z-index: 41;
    padding: 0.4em;
    display: flex;
    opacity: 0.85;
    transition: opacity 0.3s ease, transform 0.08s;
  }
  .nav-icon svg {
    width: calc(var(--size-ui) * 1.2);   /* a touch larger than the UI text */
    height: calc(var(--size-ui) * 1.2);
    display: block;
  }
  .nav-icon:hover { opacity: 1; }
  .nav-icon:active { transform: translateX(-50%) scale(0.9); }
  /* Subtract the button padding so the GLYPH lands the same 5dvh from its edge
     as the timer text does from the top — consistent spacing top and bottom. */
  .nav-top { top: 5vh; top: calc(5dvh - 0.4em + env(safe-area-inset-top, 0px)); }
  .nav-bottom { bottom: 5vh; bottom: calc(5dvh - 0.4em + env(safe-area-inset-bottom, 0px)); }
  body.entering .nav-icon,
  body.playing .nav-icon,
  body.won .nav-icon { opacity: 0; pointer-events: none; }
  /* During the shared-intro roll/draw (before the entrance) the icons stay up so
     a new player can read Help — but they hand off to the timer once the numbers
     land (entering), so the menu icon and timer never show at the same time. */
  body.replay:not(.entering):not(.playing) .nav-icon { opacity: 0.85; pointer-events: auto; }

  /* ---- Mode intro pages (Ranked / Multiplayer) ---- */
  /* Replaces the target + numbers with a single centred word on the Ranked and
     Multiplayer carousel pages. On Ranked, tapping the word fades it away to
     reveal the game; on Multiplayer it reveals "Coming soon". Taps to either
     side still flip the carousel (the word is a <button>, the only non-nav part). */
  .mode-intro {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0.6em;
    min-height: 40dvh;
    width: 100%;                 /* fill the content column so horizontal taps are forgiving */
    cursor: pointer;             /* the WHOLE centred area is the button, not just the word */
    position: relative;
    z-index: 60;                 /* on the top layer so nothing can shadow the press */
    opacity: 1;
    transition: opacity 0.5s ease;   /* fade-out when tapped to reveal the game beneath */
  }
  body.mode-intro-on .mode-intro { display: flex; }
  .mode-intro:hover .intro-word { transform: scale(1.14); } /* hovering the area enlarges the word */
  body.mode-intro-on #target,
  body.mode-intro-on #slots,
  body.mode-intro-on .calcwrap { display: none; }
  .mode-intro.leaving { opacity: 0; }            /* Ranked: fade out to reveal the game */
  .intro-word {
    background: none;
    border: none;
    font-family: var(--font);                    /* match the target + the rest of the site */
    color: var(--ink);
    cursor: pointer;
    font-size: var(--size-ui);                   /* match the menu text size */
    font-weight: 700;
    letter-spacing: 0.15em;                      /* same as the menu buttons */
    padding: 1.3em 1.9em;                        /* generous, clear tap target */
    position: relative;
    z-index: 70;                                 /* on the top layer so nothing can shadow the press */
    transition: transform 0.12s ease;
  }
  .intro-word:hover { transform: scale(1.14); }  /* enlarge like the menu buttons — makes it read as a button */
  .intro-word:active { transform: scale(0.97); }
  /* Each letter flickers random letters then locks left-to-right, like the target
     reels. Roboto Mono is monospace, so the word width stays put while it spins.
     Kept inline (not inline-block) and with no transform so the letters don't jump
     up/down as descenders cycle through — they only settle in colour when locked. */
  .intro-letter { transition: color 0.12s ease; }
  .intro-letter.spinning { color: var(--dim); }
  /* "coming soon" is absolutely positioned just below the centred word, so showing
     it doesn't shift the word up — the word stays centred. */
  .intro-soon, .intro-login, .intro-tries {
    position: absolute;
    top: 50%;
    left: 0;
    right: 0;
    transform: translateY(2.6em);
    text-align: center;
    color: var(--muted, var(--ink));
    font-family: var(--font);
    opacity: 0;
    font-size: calc(var(--size-ui) * 0.95);
    transition: opacity 0.25s ease;
  }
  .mode-intro.revealed .intro-soon { opacity: 0.7; }   /* Multiplayer only */
  /* Ranked, logged out: tapping the word shows a tappable "log in to play". */
  .intro-login { background: none; border: none; cursor: pointer; text-decoration: underline; pointer-events: none; }
  .mode-intro.needlogin .intro-login { opacity: 0.85; pointer-events: auto; }
  .mode-intro.has-tries .intro-tries { opacity: 0.6; }   /* Ranked, signed in: "N left today" */
  /* The game fades in gently when the Ranked intro is dismissed — slow enough to
     read as "this was behind the word", not a redirect. */
  @keyframes reveal-in { from { opacity: 0; } to { opacity: 1; } }
  .content.reveal-in { animation: reveal-in 0.6s ease; }

  /* ---- Pages: sketchpad + calculators carousel ---- */
  /* Sketchpad: full-screen drawing surface with a faint grid. Shown only while
     viewing the pad page (body.on-pad). */
  .sketch {
    position: fixed;
    inset: 0;
    width: 100%;                   /* canvas is a replaced element — pin its CSS
                                      size so the backing store can't leak in */
    height: 100%;
    z-index: 30;
    display: none;
    touch-action: none;            /* we own the drawing gesture */
    background-color: var(--bg);
    background-image:
      linear-gradient(to right, var(--grid) 1px, transparent 1px),
      linear-gradient(to bottom, var(--grid) 1px, transparent 1px);
    background-size: 26px 26px;
  }
  body.on-pad .sketch { display: block; }
  /* On the pad, keep the target + six numbers showing (fixed, like on the calc
     pages) — only the calculator itself goes away. The stage floats above the
     canvas but is click-through so you can draw anywhere. calcwrap stays laid
     out (visibility:hidden) so the numbers don't shift between pages. */
  body.on-pad .stage { z-index: 31; pointer-events: none; }
  body.on-pad .calcwrap { visibility: hidden; }

  /* Page dots — one per page (pad + each calculator); the current one is solid. */
  .dots {
    position: fixed;
    left: 50%;
    transform: translateX(-50%);
    /* same distance from the bottom as the timer is from the top */
    bottom: calc(5dvh + env(safe-area-inset-bottom, 0px));
    display: none;
    gap: 0.75em;
    align-items: center;
    z-index: 43;
  }
  body.entering .dots, body.playing .dots { display: flex; }
  body.won .dots { display: none; }
  .dot {
    width: 0.42em;
    height: 0.42em;
    border-radius: 50%;
    background: var(--ink);
    opacity: 0.2;
    cursor: pointer;
    transition: opacity 0.2s ease, transform 0.1s;
  }
  .dot.active { opacity: 1; }
  .dot.pad { border-radius: 1px; } /* the sketchpad reads as a little square */
  .dot:active { transform: scale(0.85); }
  /* "+" the size of a dot: swipe right (or tap it) to add a calculator page. */
  .dot-add {
    width: 0.42em;
    height: 0.42em;
    position: relative;
    opacity: 0.2;
    cursor: pointer;
    transition: opacity 0.2s ease, transform 0.1s;
  }
  .dot-add::before, .dot-add::after { content: ""; position: absolute; background: var(--ink); }
  .dot-add::before { left: 50%; top: 0; width: 1.6px; height: 100%; transform: translateX(-50%); }
  .dot-add::after { top: 50%; left: 0; height: 1.6px; width: 100%; transform: translateY(-50%); }
  .dot-add:active { transform: scale(0.85); }

  /* Delete the current page — centred between the calculator and the dots (its
     top is positioned from JS). Revealed by a long-press on mobile; always shown
     on the sketchpad and on desktop. */
  .page-del {
    position: fixed;
    left: 50%;
    top: 86dvh;
    transform: translate(-50%, -50%);
    z-index: 43;
    background: none;
    border: none;
    font-family: var(--font);
    font-size: calc(var(--size-ui) * 1.3);
    line-height: 1;
    color: var(--ink);
    opacity: 0.25;
    cursor: pointer;
    display: none;
  }
  body.playing.del-armed .page-del { display: block; } /* revealed by press+hold */
  body.won .page-del { display: none; }
  body.on-pad .page-del { display: none; }             /* pad uses the undo button */
  .page-del:hover { opacity: 0.7; }

  /* Sketchpad undo (tap = undo last stroke, hold = keep undoing). Sits at the
     centre-left, mirroring the page arrow on the right. */
  .pad-undo {
    position: fixed;
    top: 50%;
    left: calc(5dvh - 0.4em + env(safe-area-inset-left, 0px));
    transform: translateY(-50%);
    z-index: 43;
    background: none;
    border: none;
    color: var(--ink);
    opacity: 0.3;
    cursor: pointer;
    padding: 0.4em;
    display: none;
  }
  .pad-undo svg { width: calc(var(--size-ui) * 1.5); height: calc(var(--size-ui) * 1.5); display: block; }
  body.on-pad .pad-undo { display: block; }
  body.won .pad-undo { display: none; }
  .pad-undo:hover { opacity: 0.7; }
  .pad-undo:active { transform: translateY(-50%) scale(0.9); }

  /* On-screen Submit — appears (green) between the calculator and the dots once
     every number is used. Top is set in JS to the same midpoint as the x. */
  .submit {
    position: fixed;
    left: 50%;
    top: 84dvh;
    transform: translate(-50%, -50%);
    z-index: 42;
    background: none;
    border: none;
    font-family: var(--font);
    font-size: var(--size-ui);
    font-weight: 700;
    letter-spacing: 0.12em;
    color: var(--green);
    cursor: pointer;
    display: none;
  }
  body.playing.all-used:not(.on-pad):not(.del-armed):not(.won):not(.menu-open) .submit { display: block; }

  /* Page-change slide-in (directional). */
  @keyframes pageInR { from { transform: translateX(28px); opacity: 0.25; } to { transform: none; opacity: 1; } }
  @keyframes pageInL { from { transform: translateX(-28px); opacity: 0.25; } to { transform: none; opacity: 1; } }
  .page-anim-r { animation: pageInR 0.22s ease; }
  .page-anim-l { animation: pageInL 0.22s ease; }
  /* Only the calculator + its calculations move/shrink — the target and the six
     numbers stay put (like the timer). */
  .calcwrap {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    transform-origin: center bottom; /* select-shrink keeps the bottom line put */
  }
  .calcwrap.dragging { transition: none; }
  .calcwrap.snapback { transition: transform 0.18s ease; }
  /* Long-press "selected" cue: the calculator shrinks a touch, which also opens
     up room for the x between the calculator and the dots. */
  body.del-armed .calcwrap { transform: scale(0.93); transition: transform 0.2s ease; }

  .stage {
    position: relative; /* so it can sit above the sketchpad canvas on the pad */
    min-height: 100vh;
    min-height: 100dvh; /* mobile: the *visible* height, so the block centres
                           evenly top-to-bottom instead of sitting low */
    display: flex;
    align-items: center;
    justify-content: center;
    /* Keep content clear of the notch / home indicator (0 on desktop). */
    padding: calc(24px + env(safe-area-inset-top, 0px))
             calc(24px + env(safe-area-inset-right, 0px))
             calc(24px + env(safe-area-inset-bottom, 0px))
             calc(24px + env(safe-area-inset-left, 0px));
  }
  /* The playing column stays at TRUE centre (symmetric padding): the gap from the
     target down to the top edge equals the gap from the bottom keypad row (c / () / =)
     to the bottom edge. (No optical lift — the user wants them mathematically equal.) */
  /* One centered column whose width is the shared --app-w. Spacing is on the
     children (not a flex gap) so the collapsed calculator adds no gap on home. */
  .content {
    width: var(--app-w);
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* Target */
  .target {
    display: flex;
    gap: 0.05em;
    cursor: pointer;
    user-select: none;
    line-height: 1;
  }
  .reel {
    display: inline-block;
    width: 0.62em;
    text-align: center;
    font-size: var(--size-target);
    font-weight: 700;
  }
  .reel.spinning { color: var(--dim); }
  .reel.lock { animation: pop 0.28s ease; }
  @keyframes pop {
    0%   { transform: translateY(-6px) scale(1.12); }
    60%  { transform: translateY(2px) scale(0.98); }
    100% { transform: translateY(0) scale(1); }
  }

  /* Number slots — 6-column grid, full content width */
  .slots {
    width: 100%;
    margin-top: 3vh; /* space below the target */
    display: grid;
    grid-template-columns: repeat(6, 1fr);
  }
  .slot {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.35em;
  }
  .arrow {
    background: none;
    border: none;
    padding: 0.15em 0.3em;
    color: var(--ink);
    cursor: pointer;
    user-select: none;
    display: flex;
    max-height: 4em;
    overflow: hidden;
    transition: transform 0.08s, opacity 0.5s ease, max-height 0.8s ease-in-out, padding 0.8s ease-in-out;
  }
  /* Explicit height (viewBox is 16x12 -> 0.75 ratio). Avoids the flaky
     intrinsic-sizing of height:auto on mobile, which could render 0-height. */
  .arrow svg { width: var(--size-ui); height: calc(var(--size-ui) * 0.75); display: block; }
  .arrow:hover { transform: scale(1.25); }
  .arrow:active { transform: scale(0.9); }
  .arrow:disabled { opacity: 0.2; cursor: default; transform: none; } /* non-clickable */
  /* Entrance: arrows fade out first (numbers stay put). Their collapse during
     the rise is driven from JS (pinned to natural height) so it runs in sync
     with the calculator opening — see collapseArrows(). */
  body.entering .arrow,
  body.playing .arrow { opacity: 0; pointer-events: none; }
  .slot-num {
    font-size: var(--size-number);
    font-weight: 700;
    color: var(--muted); /* empty placeholder — not clickable */
    text-align: center;
    transition: color 0.15s, opacity 0.15s;
  }
  .slot-num.filled { color: var(--ink); }
  .slot-num.spinning { color: #9a9a9a; }
  .slot-num.lock { animation: pop 0.26s ease; }
  .slot-num.used { opacity: 0.2; } /* dim numbers already used in an equation */
  /* v2: drawn numbers are clickable during play */
  body.playing .slot-num.filled:not(.used) { cursor: pointer; }

  /* v2: generated-numbers row — clickable chips for results made so far */
  /* Generated-results row: each chip sits in a 1/6-width column, centred as a
     group, so the spacing matches the six numbers above. */
  .generated {
    width: 100%;
    margin-top: 1.6vh;
    /* Always reserve a row's height so freeing a result into a chip doesn't
       shift the target / numbers / keypad. */
    min-height: calc(var(--size-number) * 1.25);
    display: grid;
    grid-auto-flow: column;
    grid-auto-columns: calc(100% / 6);
    justify-content: center;
    justify-items: center;
  }
  .gen-chip {
    background: none;
    border: none;
    font-family: var(--font);
    font-size: var(--size-number);
    font-weight: 700;
    color: var(--ink);
    cursor: pointer;
    padding: 0;
    user-select: none;
    transition: transform 0.08s, opacity 0.12s;
  }
  .gen-chip:hover { transform: scale(1.12); }
  .gen-chip:active { transform: scale(0.92); }

  /* Calculator — hidden until all six numbers are drawn.
     The 5 key columns are widened to span the 6 numbers' centres
     (1/12 .. 11/12), so the outer columns sit under the outer numbers. */
  .calc {
    width: 100%;
    margin-top: 0;
    display: none;
    flex-direction: column;
    gap: 1.1em;
    max-height: 0;
    opacity: 0;
    overflow: hidden;
    /* numbers slide up (max-height), then the calc fades in (opacity) */
    transition: max-height 0.8s ease-in-out, opacity 0.5s ease;
  }
  /* Entrance: calc joins the flow collapsed, expands (raised) to push the
     numbers up, then fades in (playing). */
  body.entering .calc,
  body.playing .calc { display: flex; }
  body.playing .calc { opacity: 1; }
  /* max-height during the rise is set from JS to the calc's real content height
     so the rise stays 1:1 in sync with the arrow collapse. */

  /* Equation tape: about three faded previous lines sit above the input line,
     with a white gradient fading the oldest toward the top. */
  .history-wrap {
    position: relative;
    width: 100%;
  }
  .history {
    display: flex;
    flex-direction: column;
    justify-content: flex-end; /* newest line sits directly above the 00 line */
    align-items: flex-end;
    gap: 0.5em;
    line-height: 1.15;
    height: 5.2em;            /* three lines fully visible, a 4th fading at top */
    overflow: hidden;
    font-size: var(--size-ui);
    font-weight: 400;
    scrollbar-width: none;    /* invisible scrollbar */
    /* match the display so each line's last digit centres on the right column */
    padding-right: calc(100% / 12 - 0.3em);
  }
  .history::-webkit-scrollbar { display: none; }
  .history .line {
    color: #9a9a9a;
    white-space: nowrap;
  }
  .history-wrap::after {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    /* white at the top fading down toward the main line — older lines fade out,
       hinting there's more to reveal by tapping */
    background: linear-gradient(to bottom, var(--bg) 0%, var(--bg) 4%, transparent 75%);
  }
  .history:not(:empty) { cursor: pointer; }
  /* Tapping the tape drops the fade and reveals every line in full. */
  .history-wrap.expanded::after { display: none; }
  .history-wrap.expanded .history {
    height: auto;
    max-height: 32vh;
    overflow-y: auto;
    overscroll-behavior: contain;
    justify-content: flex-start;
    /* keep the same gap above the first line as the target<->numbers gap,
       so expanding doesn't push the calculations up against the numbers */
    padding-top: 3vh;

  .display {

    padding-right: calc(100% / 12 - 0.3em);

  /* v2: 3x3 keypad. Widen so the outer columns' centres line up with the first

  /* Result screen — same minimal system as the rest of the app. The result
     value uses the target (hero) size; labels and working use the UI size. */
  .winscreen {
    position: fixed;
    inset: 0;

  .win-their {

  /* "Beat" banner (the green time/score to beat on a shared puzzle). JS-centred

  .beat {

  body.entering .beat.show,

  .menu {
    position: fixed;

  .menu-scale-label {

  #guide:not([data-view="auth"]):not([data-view="username"]):not([data-view="account"]):not([data-view="stats"]):not([data-view="friends"]):not([data-view="games"]):not([data-view="groups"]):not([data-view="groupdetail"]):not([data-view="sharepick"]):not([data-view="leaderboard"]):not([data-view="h2h"]):not([data-view="rules"]):not([data-view="overview"]) .guide-choice { display: flex; }

  <svg class="border" preserveAspectRatio="none" aria-hidden="true">

  </svg>

  <div id="beat" class="beat"></div>

  <!-- Appears between the calculator and the dots once every number is used. -->
  <button id="submit" class="submit" data-i18n="submit">Submit</button>

  <!-- Confetti overlay (win / beat). -->
  <canvas id="confetti" class="confetti" aria-hidden="true"></canvas>

  <!-- Home-screen nav: hamburger (menu) up top where the timer sits during play,
       profile placeholder at the bottom where Submit sits. Icons, not words. -->
  <button id="nav-menu" class="nav-icon nav-top" aria-label="Menu">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
      <line x1="4" y1="7" x2="20" y2="7" />
      <line x1="4" y1="12" x2="20" y2="12" />
      <line x1="4" y1="17" x2="20" y2="17" />
    </svg>
  </button>
  <button id="nav-help" class="nav-icon nav-bottom" aria-label="How to play">
    <!-- Question mark while signed out; swaps to the profile glyph once signed in

<script type="module">
"use strict";

// Pure, DOM-free game logic lives in src/core/* (unit-tested with `node --test`).
import { SLOT_COUNT, freshLargeBag, freshSmallBag, randInt } from "./src/core/numbers.js";
import { evalExpression } from "./src/core/evaluate.js";
import { computeScore as coreComputeScore, goalFor, distance as coreDistance, verdict } from "./src/core/scoring.js";
import { buildSnapshot, normalizeSnapshot } from "./src/core/gameState.js";
// Cross-cutting constants + the localStorage wrapper.
import { SAVE_KEY, THEME_KEY, AUTOEQ_KEY, AUTOSIGN_KEY, LANG_KEY, MODE_KEY, SCALE_KEY, TIMED_SEC, MAX_CALCS, THEME_BG } from "./src/config/constants.js";
import { storage } from "./src/services/storage.js";
import { t, setLang, getLang } from "./src/services/i18n.js";
import { encodeGame, parseShareParams } from "./src/services/share.js";

/* ---------------- Number pools ---------------- */
let largeBag = freshLargeBag();
let smallBag = freshSmallBag();

/* ---------------- DOM ---------------- */
const SVGNS = "http://www.w3.org/2000/svg";
const targetEl = document.getElementById("target");
const reels = [...targetEl.querySelectorAll(".reel")];
const slotsEl = document.getElementById("slots");
const generatedEl = document.getElementById("generated");
const timerEl = document.getElementById("timer");
const borderSvg = document.querySelector(".border");
const borderPath = document.getElementById("border-path");
const displayEl = document.getElementById("display");
const displayValEl = displayEl.querySelector(".val");
const keysEl = document.getElementById("keys");
const historyEl = document.getElementById("history");
const historyWrapEl = document.querySelector(".history-wrap");
const calcEl = document.querySelector(".calc");
const winLabelEl = document.getElementById("win-label");
const winValueEl = document.getElementById("win-value");
const winSubEl = document.getElementById("win-sub");
const winTheirEl = document.getElementById("win-their");
const winHomeBtn = document.getElementById("win-home");
const winShareBtn = document.getElementById("win-share");
const toastEl = document.getElementById("toast");
const beatEl = document.getElementById("beat");
const submitEl = document.getElementById("submit");
const sketchEl = document.getElementById("sketch");
const sketchCtx = sketchEl.getContext("2d");
const dotsEl = document.getElementById("dots");
const stageEl = document.querySelector(".stage");
const contentEl = document.querySelector(".content");

let isRollingTarget = false;
let rollTimers = []; // reel spinner intervals + stagger timeouts, so they can be cancelled
let drawTimers = []; // number-draw spin timers, cancellable on leaving
let currentTarget = null;
// Intro recording (for sharing a replay) + playback state.
let introT0 = null;        // when this game's target roll began
let introDraws = [];       // [{i, t}] draws in order, t = ms since the roll began
let replaying = false;     // watching a shared intro playback
const slotValues = new Array(SLOT_COUNT).fill(null);
const slotUsed = new Array(SLOT_COUNT).fill(false);
let history = [];
// Numbers currently usable in an equation: the six drawn numbers plus any
// results produced along the way. Each is consumed once.
let available = [];
let lastResult = null;     // most recent calculator answer (the "reached" value)
let lastOutcome = null;    // this player's result for the just-finished game
let sharedGame = null;     // when set, we're playing a puzzle someone sent us
let borderDurationSec = TIMED_SEC; // how long the green bar takes to go around
let activeShareCode = null;  // the ?g= code this game came from (for refresh restore)
let activeChallengeId = null;  // the ?c= challenge id being attempted (for recording the attempt)
// Home carousel pages, in left-to-right order. App opens on "practice"; "ranked"
// is its right neighbour, "multiplayer" its left. The carousel loops both ways.
// "ranked" is the timed (2:00) mode whose results feed the leaderboard.
const HOME_ORDER = ["multiplayer", "practice", "ranked"];
let gameMode = "practice";   // which home page is showing: "practice" | "ranked" | "multiplayer"
let practiceGame = false;    // the in-progress game has no timer/border (set at start)
let rankedRevealed = false;  // the Ranked intro word has been tapped -> show the game
let practiceRevealed = false; // same, for the Practice page (no timer once revealed)
// On the home screen, your own game is "practice" only if that's the chosen mode
// (a shared game always runs ranked/timed — you're racing the sender's time).
function homeIsPractice() { return gameMode === "practice" && !sharedGame; }
// Every home page opens as a single centred word (an "intro") so they all look and
// behave the same. Ranked and Practice drop their intro once tapped (revealing the
// game beneath); Multiplayer keeps it (its word toggles "coming soon").
function introActive() {
  if (gameMode === "multiplayer") return true;      // no game to start — always the "coming soon" word
  // The intro word only belongs on a PRISTINE page. Once a target is rolled or a
  // number is drawn (incl. a game restored from a save), we're past the intro — so
  // the word must never cover an in-progress game (that stranded the page: hidden
  // target + no swipe because canHomeModeSwipe is false).
  if (currentTarget !== null || countFilled() > 0) return false;
  if (gameMode === "ranked") return !rankedRevealed;
  if (gameMode === "practice") return !practiceRevealed;
  return false;
}
// Show the time budget at the top on home: 2:00 once a ranked game is revealed,
// the sender's time-to-beat for a shared game; nothing otherwise. Also drive the
// Ranked/Multiplayer intro word (hidden target + numbers behind it).
function refreshHomeTimer() {
  const b = document.body;
  const onHome = !b.classList.contains("entering") && !b.classList.contains("playing") &&
                 !b.classList.contains("won") && !b.classList.contains("replay");
  const intro = onHome && introActive();
  b.classList.toggle("mode-intro-on", intro);
  if (intro) {
    setIntroWord(introWordText());
    document.getElementById("mode-intro").classList.remove("revealed", "leaving", "needlogin");
    renderRankedIntro(); // paint "N left today" / "out of plays" from the cached count
  }
  if (onHome && gameMode === "ranked" && rankedRevealed) {
    timerEl.textContent = fmtTime(TIMED_SEC); // 02:00 budget
    b.classList.add("home-timer");
  } else {
    b.classList.remove("home-timer");
  }
}
function setMode(m) {
  gameMode = HOME_ORDER.includes(m) ? m : "practice";
  storage.set(MODE_KEY, gameMode);
  refreshHomeTimer();
  refreshRankedTries();
}
// Daily ranked tries (needs ranked-daily.sql). `rankedTries`: cached count left
// (null = unknown / no limit). The Ranked word shows "N left today", or once you're
// out, "out of plays · <countdown to reset>" and the word stops opening.
let rankedTries = null, rankedCountdown = null;
function msToUtcMidnight() { const n = Date.now(), d = new Date(n); return Date.UTC(d.getUTCFullYear(), d.getUTCMonth(), d.getUTCDate() + 1) - n; }
function fmtToGo(ms) { ms = Math.max(0, ms); const h = Math.floor(ms / 3600000), m = Math.floor((ms % 3600000) / 60000); return h > 0 ? h + "h " + m + "m" : m + "m"; }
function renderRankedIntro() {
  const el = document.getElementById("intro-tries"), intro = document.getElementById("mode-intro");
  clearInterval(rankedCountdown); rankedCountdown = null;
  if (gameMode !== "ranked" || !authSession || rankedTries === null) { el.textContent = ""; intro.classList.remove("has-tries", "out-of-plays"); return; }
  intro.classList.add("has-tries");
  if (rankedTries > 0) { intro.classList.remove("out-of-plays"); el.textContent = t("ranked.left", { n: rankedTries }); }
  else {
    intro.classList.add("out-of-plays");
    const paint = () => { el.textContent = t("ranked.out") + " · " + fmtToGo(msToUtcMidnight()); };
    paint(); rankedCountdown = setInterval(paint, 30000);
  }
}
async function refreshRankedTries() {
  if (gameMode !== "ranked" || !authSession) { rankedTries = null; renderRankedIntro(); return; }
  try { const left = await (await import("./src/services/stats.js")).rankedTriesLeft(); rankedTries = (left === null ? null : left); }
  catch (e) { rankedTries = null; }
  renderRankedIntro();
}
// Tapping the Ranked/Practice intro word fades it away and reveals the game beneath
// (Ranked additionally shows its 02:00 budget; Practice has no timer).
function revealMode() {
  const intro = document.getElementById("mode-intro");
  if (intro.classList.contains("leaving")) return;
  setIntroWord(introWordText());               // snap to the finished word before fading (if tapped mid-flicker)
  intro.classList.add("leaving");
  let done = false;
  const once = (e) => {
    if (e && e.propertyName !== "opacity") return;
    if (done) return;
    done = true;
    intro.removeEventListener("transitionend", once);
    if (gameMode === "ranked") rankedRevealed = true; else practiceRevealed = true;
    refreshHomeTimer();                       // drops the intro, shows target (+ 02:00 for ranked)
    contentEl.classList.add("reveal-in");
    setTimeout(() => contentEl.classList.remove("reveal-in"), 650);
  };
  intro.addEventListener("transitionend", once);
  setTimeout(once, 560);                       // fallback if transitionend doesn't fire (> the 0.5s fade)
}

// Slot-machine letter cycling for the intro word — mirrors the target reels: each
// letter flickers random letters, then locks left-to-right to spell the word.
let introTimers = [];
function clearIntroAnim() { introTimers.forEach((id) => { clearInterval(id); clearTimeout(id); }); introTimers = []; }
function buildIntroLetters(text) {
  const word = document.getElementById("intro-word");
  word.textContent = "";
  return [...text].map((ch) => {
    const s = document.createElement("span");
    s.className = "intro-letter";
    s.textContent = ch;
    word.appendChild(s);
    return s;
  });
}
function setIntroWord(text) { clearIntroAnim(); buildIntroLetters(text); } // static (init / language toggle)
function animateIntroWord(text) {
  clearIntroAnim();
  const spans = buildIntroLetters(text);
  const rnd = () => String.fromCharCode(97 + randInt(0, 25)); // lowercase a–z while spinning
  // The page slide is ~0.22s; keep the letters running ~half a second AFTER it
  // lands, then stop them left-to-right.
  const START = 600;
  spans.forEach((s, i) => {
    s.classList.add("spinning");
    s.textContent = rnd();
    const spin = setInterval(() => { s.textContent = rnd(); }, 45);
    introTimers.push(spin);
    introTimers.push(setTimeout(() => {            // stop + lock this letter (cascades left-to-right)
      clearInterval(spin);
      s.textContent = text[i];
      s.classList.remove("spinning");
      s.classList.add("lock");
    }, START + i * 70));
  });
}
function introWordText() {
  return t(gameMode === "ranked" ? "mode.ranked" : gameMode === "practice" ? "mode.practice" : "mp.title");
}

/* ---------------- Chevron arrows (identical up/down) ---------------- */
function chevron(dir) {
  const svg = document.createElementNS(SVGNS, "svg");
  svg.setAttribute("viewBox", "0 0 16 12");
  svg.setAttribute("width", "16");  // intrinsic fallback; CSS sizes it
  svg.setAttribute("height", "12");
  const p = document.createElementNS(SVGNS, "path");
  p.setAttribute("d", dir === "up" ? "M2 9 L8 3 L14 9" : "M2 3 L8 9 L14 3");
  p.setAttribute("fill", "none");
  p.setAttribute("stroke", "currentColor");
  p.setAttribute("stroke-width", "2.4");
  p.setAttribute("stroke-linecap", "round");
  p.setAttribute("stroke-linejoin", "round");
  svg.appendChild(p);
  return svg;
}

/* ---------------- Slots ---------------- */
function buildSlots() {
  slotsEl.innerHTML = "";
  for (let i = 0; i < SLOT_COUNT; i++) {
    const slot = document.createElement("div");
    slot.className = "slot";

    const up = document.createElement("button");
    up.className = "arrow up";
    up.setAttribute("aria-label", "Draw a large number");
    up.appendChild(chevron("up"));
    up.addEventListener("click", () => drawInto(i, "large"));

    const num = document.createElement("div");
    num.className = "slot-num";
    num.textContent = "00";
    // v2: click a drawn number to place it into the calculation line.
    num.addEventListener("click", () => {
      if (!document.body.classList.contains("playing")) return;
      if (!num.classList.contains("filled")) return;
      const e = available.find((x) => x.slotIndex === i);
      if (e && !e.tentative) playNumber(e);
    });

    const down = document.createElement("button");
    down.className = "arrow down";
    down.setAttribute("aria-label", "Draw a small number");
    down.appendChild(chevron("down"));
    down.addEventListener("click", () => drawInto(i, "small"));

    slot.append(up, num, down);
    slotsEl.appendChild(slot);
  }
}

function slotParts(i) {
  const slot = slotsEl.children[i];
  return {
    up: slot.querySelector(".up"),
    down: slot.querySelector(".down"),
    num: slot.querySelector(".slot-num"),
  };
}

function resetSlots() {
  for (let i = 0; i < SLOT_COUNT; i++) {
    const { up, down, num } = slotParts(i);
    num.textContent = "00";
    num.className = "slot-num";
    // Arrows stay disabled until a target has been generated.
    up.disabled = true;
    down.disabled = true;
    slotValues[i] = null;
    slotUsed[i] = false;
  }
  largeBag = freshLargeBag();
  smallBag = freshSmallBag();
}

// Enable/disable the draw arrows on every still-empty slot.
function setArrowsEnabled(enabled) {
  for (let i = 0; i < SLOT_COUNT; i++) {
    const { up, down, num } = slotParts(i);
    if (num.classList.contains("filled")) continue;
    up.disabled = !enabled;
    down.disabled = !enabled;
  }
}

function countFilled() {
  let n = 0;
  for (let i = 0; i < SLOT_COUNT; i++) {
    if (slotParts(i).num.classList.contains("filled")) n++;
  }
  return n;
}

function drawInto(i, size) {
  const { up, down, num } = slotParts(i);
  if (num.classList.contains("filled") || num.classList.contains("spinning")) return;

  const bag = size === "large" ? largeBag : smallBag;
  if (bag.length === 0) {
    num.animate([{ opacity: 1 }, { opacity: 0.25 }, { opacity: 1 }], { duration: 300 });
    return;
  }

  const value = bag.splice(randInt(0, bag.length - 1), 1)[0];
  slotValues[i] = value;
  if (introT0 !== null && !replaying) introDraws.push({ i: i, t: Date.now() - introT0 });

  num.classList.add("spinning");
  const spin = setInterval(() => {
    num.textContent = size === "large" ? randInt(10, 99) : randInt(1, 9);
  }, 45);
  drawTimers.push(spin);

  drawTimers.push(setTimeout(() => {
    clearInterval(spin);
    num.textContent = value;
    num.classList.remove("spinning");
    num.classList.add("filled", "lock");
    setTimeout(() => num.classList.remove("lock"), 280);
    up.disabled = true;
    down.disabled = true;
    // Only begin once BOTH the target and all six numbers exist.
    if (countFilled() === SLOT_COUNT && currentTarget !== null) beginEntrance();
    else saveState(); // persist selection progress
  }, 420));
}

function stopDraws() {
  drawTimers.forEach((id) => { clearInterval(id); clearTimeout(id); });
  drawTimers = [];
}

/* ---------------- Green border geometry (CSS drives the motion) ---------------- */
function layoutBorder() {
  const w = window.innerWidth;
  const h = window.innerHeight;
  const inset = 5; // half the stroke width, keeps the bar fully on-screen
  const cx = w / 2;
  borderSvg.setAttribute("viewBox", `0 0 ${w} ${h}`);
  // Start at top-centre and run clockwise (toward the top-right first) so the
  // green grows from the top centre to the right.
  borderPath.setAttribute(
    "d",
    `M${cx} ${inset} L${w - inset} ${inset} L${w - inset} ${h - inset} ` +
    `L${inset} ${h - inset} L${inset} ${inset} Z`
  );
}
// Centre the green "Beat X" banner vertically in the gap between the timer and
// the target, so it never overlaps either (or the menu icon).
function positionBeat() {
  if (!beatEl.classList.contains("show")) return;
  const t = timerEl.getBoundingClientRect();
  const tg = targetEl.getBoundingClientRect();
  if (!tg.height) return;
  beatEl.style.top = Math.round((t.bottom + tg.top) / 2) + "px";
}
// Keep the banner glued to the target while it rises into play, so it travels up
// at the same rate (rather than snapping) — runs for the rise's duration.
let beatTrackRAF = null;
function trackBeatFor(ms) {
  cancelAnimationFrame(beatTrackRAF);
  const end = Date.now() + ms;
  const step = () => {
    positionBeat();
    if (Date.now() < end) beatTrackRAF = requestAnimationFrame(step); else beatTrackRAF = null;
  };
  beatTrackRAF = requestAnimationFrame(step);
}
function onViewportResize() { layoutBorder(); sizeSketch(); positionPageDel(); positionBeat(); sizeConfetti(); }
window.addEventListener("resize", onViewportResize);
// Mobile: the visible area changes as the address bar shows/hides — keep the
// ring framed to it rather than a stale window.innerHeight.
if (window.visualViewport) {
  window.visualViewport.addEventListener("resize", onViewportResize);
}

// When the green ring finishes draining, a red ring grows for one rotation
// (same duration as the green lap); when that finishes, it stays solid red.
borderPath.addEventListener("animationend", (e) => {
  if (e.animationName === "borderDrain") {
    // Ignore a stale ring that finishes after you've already left the game (e.g.
    // solved early then went Home) — only a live game times out.
    if (!document.body.classList.contains("playing")) return;
    // The 2:00 clock is up (timed games): auto-register the score.
    document.body.classList.add("time-up");
    autoSubmitTimeUp();
  } else if (e.animationName === "borderFill") {
    // Shared-practice grow: green lap done -> grow a red lap -> lock solid red.
    if (!borderRedGrow) {
      borderRedGrow = true;
      borderPath.style.animation = "none";
      void borderPath.offsetWidth;
      borderPath.style.stroke = "var(--red)";
      borderPath.style.strokeDashoffset = "";
      borderPath.style.animationDelay = "0s";
      borderPath.style.animation = "borderFill " + borderGrowSec + "s linear forwards";
    } else {
      borderPath.style.animation = "none";
      borderPath.style.stroke = "var(--red)";
      borderPath.style.strokeDashoffset = "0"; // solid full red
    }
  }
});
// Time's up: score the calculator page you're on (or, from the sketchpad, the
// calc page immediately to its right).
function autoSubmitTimeUp() {
  if (document.body.classList.contains("won")) return;
  if (pageIndex === 0) gotoPageCore(1); // sketchpad -> first calc page
  if (pageIndex < 1) return;
  finishSubmitted();
}
function resetBorder() {
  // back to the full, static green ring
  borderPath.style.animation = "";
  borderPath.style.stroke = "";
  borderPath.style.strokeDashoffset = "";
  borderPath.style.animationDelay = "";
  borderPath.style.animationPlayState = "";
}
// Start (or resume, via delaySec) the green drain over a fixed 2:00. The ring
// turns red at the 1:00 halfway mark — or, on a shared game whose sender solved,
// at the sender's solve time (the moment you fall behind their pace).
function startBorderDrain(delaySec) {
  const d = delaySec || 0;
  const solvedShare = sharedGame && sharedGame.outcome && sharedGame.outcome.solved;
  const redSec = solvedShare
    ? Math.max(1, Math.min(borderDurationSec, Math.round(sharedGame.outcome.timeSec)))
    : borderDurationSec / 2;
  borderPath.style.stroke = "";
  borderPath.style.strokeDashoffset = "";
  borderPath.style.animation =
    "borderDrain " + borderDurationSec + "s linear forwards, borderHalf " + redSec + "s linear forwards";
  borderPath.style.animationDelay = "-" + d + "s, -" + d + "s";
}
// Shared-practice grow: a green ring grows from empty to full over the sender's
// solve time, then a red ring grows over the same span, then locks solid red.
let borderGrowSec = 60, borderRedGrow = false;
function startBorderGrow(delaySec) {
  const d = delaySec || 0;
  borderGrowSec = Math.max(1, Math.round((sharedGame && sharedGame.outcome && sharedGame.outcome.timeSec) || 60));
  borderRedGrow = false;
  borderPath.style.stroke = "";          // green
  borderPath.style.strokeDashoffset = "";
  borderPath.style.animation = "borderFill " + borderGrowSec + "s linear forwards";
  borderPath.style.animationDelay = "-" + d + "s";
}
// Dispatch the right ring for the game: timed drains, shared-practice grows,
// own practice has none.
function startBorder(delaySec) {
  if (sharedGame && sharedGame.practice) startBorderGrow(delaySec);
  else if (isTimedGame()) startBorderDrain(delaySec);
}

/* ---------------- Timer text ---------------- */
let timerInt = null;
let startEpoch = 0; // absolute ms when the round began (survives a refresh)

function fmtTime(totalSeconds) {
  const s = Math.floor(totalSeconds);
  const mm = String(Math.floor(s / 60)).padStart(2, "0");
  const ss = String(s % 60).padStart(2, "0");
  return mm + ":" + ss;
}

// A "timed" game counts DOWN from the 2:00 cap, drains the ring, and auto-submits.
// Practice (own or shared) is an open-ended stopwatch that counts UP with no cap.
function isTimedGame() {
  if (sharedGame) return !sharedGame.practice;
  return !practiceGame;
}
function timerText() {
  const elapsed = (Date.now() - startEpoch) / 1000;
  return isTimedGame() ? fmtTime(Math.max(0, borderDurationSec - elapsed)) : fmtTime(elapsed);
}
function runTimerLoop() {
  timerEl.textContent = timerText();
  clearInterval(timerInt);
  timerInt = setInterval(() => { timerEl.textContent = timerText(); }, 250);
}

function startTimer() {
  startEpoch = Date.now();
  runTimerLoop();
}

function stopTimer() {
  clearInterval(timerInt);
}

/* ---------------- Calculator ---------------- */
// v2: no digit pad — numbers are clicked in from the board above. Only
// operators live on the keypad, in a 3x3 grid. "()" is one smart bracket.
const KEYS = [
  "+", "x", "^",
  "-", "÷", "√",
  "c", "()", "=",
];
let expr = "";
let lineSum = null;        // value of the running result currently on the line
// The available entry for that running result. Invariant: when lineSum !== null,
// lineEntry is the LAST result entry in `available` (slotIndex null, !isTarget) —
// that's how undo/restore re-derive it. Keep evaluate()/clearLine() consistent.
let lineEntry = null;
let lastPlayed = null;     // the most recent number placed (for the decimal-error revert)
let autoEqual = true;      // auto-evaluate each step (toggle in the menu)
let autoSign = "x";        // sign auto-inserted between two numbers (menu choice)
let undoStack = [];        // full-state snapshots so clear-once can undo

// Pages: a sketchpad (always leftmost) plus one or more independent calculators
// over the same target + six numbers. The live calculator globals above ARE the
// active page's working set; switching pages snapshots the old one and loads the
// new. pageIndex 0 = sketchpad; 1..N = calcPages[pageIndex-1]. (MAX_CALCS imported)
let calcPages = [];        // per-calculator state snapshots
let padStrokes = [];       // sketchpad strokes; each is an array of {x,y} in 0..1
let pageIndex = 1;

function buildKeys() {
  keysEl.innerHTML = "";
  KEYS.forEach((label) => {
    const btn = document.createElement("button");
    btn.className = "key";
    if (label === "c") btn.classList.add("clear");
    if (label === "=") btn.classList.add("equals");
    btn.textContent = label;
    // Clear key: tap deletes one step; press-and-hold keeps deleting until you
    // let go (no double/triple tap — that triggered zoom on mobile).
    if (label === "c") {
      btn.addEventListener("pointerdown", (e) => {
        e.preventDefault();
        try { btn.setPointerCapture(e.pointerId); } catch (_) {}
        startClearHold();
      });
      btn.addEventListener("pointerup", stopClearHold);
      btn.addEventListener("pointercancel", stopClearHold);
    } else {
      btn.addEventListener("click", () => pressKey(label));
    }
    keysEl.appendChild(btn);
  });
}

function renderHistory() {
  historyEl.innerHTML = "";
  history.forEach((line) => {
    const d = document.createElement("div");
    d.className = "line";
    d.textContent = line;
    historyEl.appendChild(d);
  });
}

// Clear key: a tap is one undo; holding repeats it (after a short delay) until
// the finger lifts, so you can wind the whole line back without tapping.
let clearHoldDelay = null, clearHoldRepeat = null;
function startClearHold() {
  undo();                                    // immediate single step
  clearHoldDelay = setTimeout(() => {
    clearHoldRepeat = setInterval(undo, 110);
  }, 350);
}
function stopClearHold() {
  clearTimeout(clearHoldDelay);
  clearInterval(clearHoldRepeat);
  clearHoldDelay = clearHoldRepeat = null;
}

// Fade each slot that is permanently used OR tentatively placed on the line.
function refreshSlots() {
  for (let i = 0; i < SLOT_COUNT; i++) {
    const e = available.find((x) => x.slotIndex === i);
    slotParts(i).num.classList.toggle("used", slotUsed[i] || !!(e && e.tentative));
  }
  document.body.classList.toggle("all-used", allUsedUp());
}

// True once everything's collapsed to a single value: all six numbers used with
// at most one loose result left — that one being the final answer, whether it's
// still on the line or was banked with = (which frees it as a chip). More than
// one loose result means the working isn't finished. (Target is optional.)
function allUsedUp() {
  if (SLOT_COUNT === 0 || !slotUsed.every(Boolean)) return false;
  const loose = available.filter((e) => e.slotIndex === null && !e.isTarget && e !== lineEntry && !e.tentative);
  return loose.length <= 1;
}

// The generated-numbers row shows only FREED results (as reminders). A result
// that's currently on the line, or a number tentatively placed in the current
// equation, is not shown — so nothing shifts while you work.
function renderGenerated() {
  generatedEl.innerHTML = "";
  available.forEach((e) => {
    if (e.slotIndex !== null || e.isTarget) return; // results only
    if (e.tentative || e === lineEntry) return;     // currently in the line
    const chip = document.createElement("button");
    chip.className = "gen-chip";
    chip.textContent = e.value;
    chip.addEventListener("click", () => playNumber(e));
    generatedEl.appendChild(chip);
  });
}

// True when the line is expecting a value (start / after an operator or "(").
function expectingValue() {
  if (expr === "") return true;
  return /[+\-x÷^(√]/.test(expr[expr.length - 1]); // √ is binary: a value follows it
}

// A finished single operation that auto-evaluates (one step at a time):
// "num op num" (√ is binary now, so it's just another operator here).
function readyToAutoEval() {
  return /^-?\d+(?:\.\d+)?[-+x÷^√]-?\d+(?:\.\d+)?$/.test(expr);
}

// Whole-calculator snapshot so one clear-click can undo the last action.
function pushUndo() {
  undoStack.push({
    expr: expr,
    available: available.map((e) => ({ value: e.value, slotIndex: e.slotIndex, isTarget: e.isTarget, tentative: e.tentative })),
    slotUsed: slotUsed.slice(),
    history: history.slice(),
    lineSum: lineSum,
    hasLineEntry: lineEntry !== null,
  });
  if (undoStack.length > 100) undoStack.shift();
}
function restoreSnapshot(s) {
  expr = s.expr;
  available = s.available.map((e) => ({ value: e.value, slotIndex: e.slotIndex, isTarget: e.isTarget, tentative: e.tentative }));
  s.slotUsed.forEach((v, i) => { slotUsed[i] = v; });
  history = s.history.slice();
  lineSum = s.lineSum === undefined ? null : s.lineSum;
  lineEntry = null;
  if (s.hasLineEntry) {
    for (let i = available.length - 1; i >= 0; i--) {
      const e = available[i];
      if (e.slotIndex === null && !e.isTarget) { lineEntry = e; break; }
    }
  }
  refreshSlots();
  renderHistory();
  renderGenerated();
  renderDisplay();
}
function undo() {
  if (undoStack.length === 0) return;
  restoreSnapshot(undoStack.pop());
  saveState();
}

// Place a number (from a slot, chip, or the target) onto the line. It fades
// immediately (tentatively used); two numbers in a row auto-insert the chosen
// auto-sign; with auto-equal on, a completed single operation evaluates.
function playNumber(entry) {
  if (!entry || entry.tentative || entry === lineEntry) return;
  lastPlayed = entry; // the most recent number on the line (for the decimal-error revert)
  document.body.classList.remove("del-armed"); // using the calc deselects the x
  pushUndo();
  if (!expectingValue()) {                             // auto-sign between numbers
    expr += autoSign;
    // Extra undo point: a clear-click then removes just the number and keeps
    // the operator, so it's easy to swap in a different number.
    pushUndo();
  }
  entry.tentative = true;
  expr += String(entry.value);
  refreshSlots();
  renderGenerated();
  renderDisplay();
  if (autoEqual && readyToAutoEval()) {
    // Snapshot the finished equation first, so one clear-click clears the sum
    // line and shows the whole equation again (matching auto-equal off).
    pushUndo();
    evaluate();
  } else saveState();
}

// One bracket button: closes an open "(" when we're right after a value,
// otherwise opens a new "(" (auto-multiplying if it follows a value).
function nextBracket() {
  const open = (expr.match(/\(/g) || []).length - (expr.match(/\)/g) || []).length;
  const last = expr[expr.length - 1] || "";
  if (open > 0 && /[0-9.)]/.test(last)) return ")";
  return /[0-9.)]/.test(last) ? "x(" : "(";
}

function renderDisplay() {
  clearTimeout(errorFlashTimer); // a real render cancels any pending error flash
  if (expr === "") {
    displayValEl.textContent = "00";
    displayEl.className = "display empty";
  } else {
    displayValEl.textContent = expr;
    displayEl.className = "display";
  }
}

function pressKey(label) {
  document.body.classList.remove("del-armed"); // using the calc deselects the x
  // The clear key is handled separately (multi-click) and never reaches here.
  if (label === "=") { pushUndo(); handleEquals(); return; }
  pushUndo();
  if (label === "()") { expr += nextBracket(); renderDisplay(); saveState(); return; }
  // Binary operator: + - x ÷ ^ √  (a√b = b-th root of a). Pressing an operator right
  // after another REPLACES it (e.g. "5÷" then "x" -> "5x"), so you can correct the
  // sign without deleting. Brackets are handled above, so they never replace.
  const last = expr[expr.length - 1] || "";
  expr = /[+\-x÷^√]/.test(last) ? expr.slice(0, -1) + label : expr + label;
  renderDisplay();
  saveState();
}

// Clear the line: commit the running sum to the tape, return tentative numbers
// to full opacity, and free the result as a reminder chip.
function clearLine() {
  if (lineSum !== null) { history.push(String(lineSum)); renderHistory(); }
  available.forEach((e) => { e.tentative = false; });
  lineEntry = null;
  lineSum = null;
  expr = "";
  refreshSlots();
  renderGenerated();
  renderDisplay();
  saveState();
}

function handleEquals() {
  // A plain running result just commits (free it to the tape + a chip).
  if (lineSum !== null && /^-?\d+(?:\.\d+)?$/.test(expr)) { clearLine(); return; }
  evaluate(); // bracket / compound expressions
}

function evaluate() {
  // Two operators in a row (e.g. "5xx6") is a slip, not exponentiation — roll it
  // back to the first number + operator instead of computing something silly.
  if (/[x+÷^√-]{2}/.test(expr)) return invalidError();
  // Pure numeric evaluation in core/evaluate.js; this keeps the DOM/state side
  // effects. `closed` reflects any auto-closed brackets — sync the display to it.
  const r = evalExpression(expr);
  if (r.status === "empty") return;
  if (r.closed != null && r.closed !== expr) { expr = r.closed; renderDisplay(); }
  if (r.status === "invalid") return invalidError();
  if (r.status === "fraction") return decimalError(); // no fractions (= and auto-= alike)

  const rounded = r.value;

  // The operands are exactly: the running result (if we continued from one)
  // plus every number tentatively placed in this equation.
  const consumed = [];
  if (lineEntry) consumed.push(lineEntry);
  available.forEach((e) => { if (e.tentative) consumed.push(e); });

  // History reads equation / sum / equation / sum: commit the previous sum
  // (it's being used now) before this equation's line.
  if (lineSum !== null) history.push(String(lineSum));
  history.push(expr);
  renderHistory();

  consumed.forEach((e) => { if (e.slotIndex !== null) slotUsed[e.slotIndex] = true; });
  available = available.filter((e) => consumed.indexOf(e) === -1);
  const resultEntry = { value: rounded, slotIndex: null, isTarget: false, tentative: false };
  available.push(resultEntry);
  lineEntry = resultEntry;
  lineSum = rounded;
  lastResult = rounded;

  // The answer is the running value on the line only (not yet a chip / sum line).
  expr = String(rounded);
  refreshSlots();
  renderGenerated();
  renderDisplay();
  saveState();

  // Round complete: reach the target with all six numbers used, OR work down
  // from the target to exactly 0 (target used) with all six numbers used.
  const allUsed = slotUsed.every(Boolean);
  const targetUsed = !available.some((e) => e.isTarget);
  if (currentTarget !== null && allUsed &&
      (rounded === currentTarget || (rounded === 0 && targetUsed))) {
    finishSolved();
  }
}

function showError() {
  displayValEl.textContent = "Error";
  displayEl.className = "display error";
}

// A fraction was produced: flag the error and drop ONLY the last number entered,
// keeping everything before it — the running sum / first number AND the operator.
// (So "25÷3" -> "25÷", "800√3" -> "800√"; you just pick a different last number.)
let errorFlashTimer = null;
function decimalError() {
  if (lastPlayed && lastPlayed.tentative) lastPlayed.tentative = false; // free that last number
  expr = expr.replace(/\d+$/, ""); // strip the trailing number, leave the operator
  refreshSlots();
  renderGenerated();
  showError();                // flash "Error", then reveal the restored line
  saveState();
  clearTimeout(errorFlashTimer);
  errorFlashTimer = setTimeout(() => { if (displayEl.classList.contains("error")) renderDisplay(); }, 900);
}

// An invalid expression (e.g. two operators in a row, "5xx6"): flash "Error" and
// roll the line back to a valid in-progress state — the first number + the first
// operator ("5x") — freeing the extra number, then auto-clear the flash.
function invalidError() {
  if (lastPlayed && lastPlayed.tentative) lastPlayed.tentative = false; // free the last number
  expr = expr.replace(/\d+(?:\.\d+)?$/, "");            // strip the trailing number
  expr = expr.replace(/([^0-9.]{2,})$/, (m) => m[0]);   // collapse a run of trailing operators to the first
  refreshSlots();
  renderGenerated();
  showError();
  saveState();
  clearTimeout(errorFlashTimer);
  errorFlashTimer = setTimeout(() => { if (displayEl.classList.contains("error")) renderDisplay(); }, 900);
}

/* ---------------- Pages (sketchpad + calculators) ---------------- */
// A fresh calculator for the current puzzle: all six numbers + target available.
function blankCalc() {
  const av = slotValues.map((v, i) => ({ value: v, slotIndex: i, isTarget: false, tentative: false }));
  if (currentTarget !== null) av.push({ value: currentTarget, slotIndex: null, isTarget: true, tentative: false });
  return { expr: "", lineSum: null, hasLineEntry: false, available: av,
           slotUsed: new Array(SLOT_COUNT).fill(false), history: [], undoStack: [], lastResult: null, tapeOpen: false };
}
// Freeze the live calculator into a plain object (undo history dropped for save).
function snapshotCalc(keepUndo) {
  return {
    expr: expr, lineSum: lineSum, hasLineEntry: lineEntry !== null,
    available: available.map((e) => ({ value: e.value, slotIndex: e.slotIndex, isTarget: e.isTarget, tentative: e.tentative })),
    slotUsed: slotUsed.slice(), history: history.slice(),
    undoStack: keepUndo ? undoStack.slice() : [], lastResult: lastResult,
    tapeOpen: historyWrapEl.classList.contains("expanded"),
  };
}
// Make a snapshot the live calculator and render it.
function loadCalc(snap) {
  expr = snap.expr || "";
  lineSum = snap.lineSum === undefined ? null : snap.lineSum;
  available = (snap.available || []).map((e) => ({ value: e.value, slotIndex: e.slotIndex, isTarget: e.isTarget, tentative: !!e.tentative }));
  for (let i = 0; i < SLOT_COUNT; i++) slotUsed[i] = !!(snap.slotUsed && snap.slotUsed[i]);
  history = snap.history ? snap.history.slice() : [];
  undoStack = snap.undoStack ? snap.undoStack.slice() : [];
  lastResult = snap.lastResult === undefined ? null : snap.lastResult;
  lineEntry = null;
  if (snap.hasLineEntry) {
    for (let i = available.length - 1; i >= 0; i--) {
      const e = available[i];
      if (e.slotIndex === null && !e.isTarget) { lineEntry = e; break; }
    }
  }
  collapseTape();
  renderHistory();
  refreshSlots();
  renderGenerated();
  renderDisplay();
  if (snap.tapeOpen) expandTape(); // each page keeps its expanded/collapsed state
}

function pageCount() { return 1 /* sketchpad */ + calcPages.length; }

// Fresh start: one sketchpad + one calculator, on the calculator.
function initPages() {
  padStrokes = [];
  calcPages = [blankCalc()];
  pageIndex = 1;
  document.body.classList.remove("on-pad");
  loadCalc(calcPages[0]);
  renderDots();
  sizeSketch();
}

// Write the live calculator back into its page slot (call before leaving it).
function syncActiveCalc() {
  if (pageIndex >= 1 && calcPages[pageIndex - 1]) calcPages[pageIndex - 1] = snapshotCalc(true);
}

function renderDots() {
  dotsEl.innerHTML = "";
  for (let i = 0; i < pageCount(); i++) {
    const d = document.createElement("div");
    d.className = "dot" + (i === pageIndex ? " active" : "") + (i === 0 ? " pad" : "");
    const to = i;

    if (Math.abs(dx) >= commitDist()) commitModeSwipe(dx < 0); // drag left -> right neighbour (content follows the finger)
  } else if (swipeAxis === "v") {
    // drag the help/menu sheet in from its edge, following the finger
    dragSheet(vDir, (vDir === 1 ? -dy : dy) / window.innerHeight);
  }
});
function endSwipe(e) {
  cancelLongPress();
  if (!swiping) return;
  swiping = false;
  if (swipeDone) return; // a horizontal page-swipe already committed
  const dx = e.clientX - swipeX, dy = e.clientY - swipeY;
  if (swipeAxis === "v") {
    calcwrapEl.classList.remove("dragging");
    const dist = vDir === 1 ? -dy : dy;
    const progress = dist / window.innerHeight;
    settleSheet(vDir, sheetShouldOpen(progress, dist, Date.now() - swipeT0)); // far enough, or a fast flick
    return;
  }
  if (homeSwiping) { snapBackContent(); return; } // home mode-swipe that didn't commit
  snapBack(); // horizontal page-swipe that didn't commit -> ease back
}
stageEl.addEventListener("pointerup", endSwipe);
stageEl.addEventListener("pointercancel", endSwipe);
document.getElementById("page-del").addEventListener("click", deleteCurrentPage);

// Sketchpad undo icon: tap undoes the last stroke, hold keeps undoing (faster).

});

  if (padUndoBtnHeld) padUndoHoldStop();
  else if (padUndoOnce()) saveState(); // tap = undo one
}
